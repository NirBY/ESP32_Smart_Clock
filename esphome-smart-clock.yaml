substitutions:
  device_name: esp32-smart-clock
  friendly_name: ESP32 Smart Clock

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  build_path: C:/Users/nirbe/.esphome/build/${device_name}

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: !secret api_encryption_key
  actions:
    - action: show_message
      variables:
        message: string
      then:
        - lambda: |-
            id(text_message) = message;
            id(text_message_until) = message.empty() ? 0 : millis() + 10000;
        - component.update: matrix_display
    - action: clear_message
      then:
        - lambda: |-
            id(text_message).clear();
            id(text_message_until) = 0;
        - component.update: matrix_display

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret fallback_ap_password

captive_portal:

globals:
  - id: text_message
    type: std::string
    restore_value: no
    max_restore_data_length: 100
    initial_value: '""'
  - id: text_message_until
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: sensor_message_until
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: wifi_alert_until
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: date_message_until
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: media_message
    type: std::string
    restore_value: no
    max_restore_data_length: 64
    initial_value: '""'
  - id: media_message_until
    type: uint32_t
    restore_value: no
    initial_value: '0'

i2c:
  sda: GPIO21
  scl: GPIO22
  scan: true

spi:
  clk_pin: GPIO18
  mosi_pin: GPIO23

i2s_audio:
  i2s_lrclk_pin: GPIO27
  i2s_bclk_pin: GPIO26

