time:
  - platform: homeassistant
    id: ha_time
    timezone: Asia/Jerusalem
    on_time_sync:
      then:
        - logger.log: "Home Assistant time synchronized"
        - component.update: matrix_display

  - platform: sntp
    id: ntp_time
    timezone: Asia/Jerusalem
    servers:
      - 0.pool.ntp.org
      - 1.pool.ntp.org
      - 2.pool.ntp.org
    update_interval: 1h
    on_time_sync:
      then:
        - logger.log: "SNTP time synchronized"
        - component.update: matrix_display
    on_time:
      - seconds: 0
        then:
          - if:
              condition:
                lambda: |-
                  auto now = id(ntp_time).now();
                  return now.is_valid()
                    && id(alarm_enabled).state
                    && now.hour == (int) id(alarm_hour).state
                    && now.minute == (int) id(alarm_minute).state;
              then:
                - script.execute: alarm_triggered
      - seconds: 0
        minutes: 0
        then:
          - lambda: |-
              const float seconds = isnan(id(date_message_seconds).state) ? 3.0f : id(date_message_seconds).state;
              id(date_message_until) = millis() + (uint32_t) (seconds * 1000.0f);
              if (id(hourly_beep_enabled).state && millis() >= 15000) {
                auto now = id(ntp_time).now();
                const int hour = now.hour;
                const int quiet_start = isnan(id(hourly_beep_quiet_start_hour).state) ? 22 : (int) id(hourly_beep_quiet_start_hour).state;
                const int quiet_end = isnan(id(hourly_beep_quiet_end_hour).state) ? 7 : (int) id(hourly_beep_quiet_end_hour).state;
                const bool quiet_window_active = id(hourly_beep_quiet_hours_enabled).state
                  && quiet_start != quiet_end
                  && (quiet_start < quiet_end
                    ? (hour >= quiet_start && hour < quiet_end)
                    : (hour >= quiet_start || hour < quiet_end));
                if (quiet_window_active) {
                  ESP_LOGI("audio", "Hourly beep skipped by quiet hours (hour=%d, quiet=%02d:00-%02d:00)",
                           hour, quiet_start, quiet_end);
                  return;
                }
                ESP_LOGI("audio", "Hourly beep queued");
                id(hourly_beep_pending) = true;
              }
          - component.update: matrix_display

script:
  - id: request_time_sync
    mode: restart
    then:
      - lambda: |-
          auto now = id(ntp_time).now();
          if (now.is_valid()) {
            id(time_sync_retry_active) = false;
            if (id(system_alert_message) == "SYNC" || id(system_alert_message) == "NO NET") {
              id(system_alert_message).clear();
              id(system_alert_until) = 0;
            }
            return;
          }

          id(time_sync_retry_active) = true;
          id(time_sync_retry_count)++;
          id(last_time_sync_retry_ms) = millis();
          const bool restarted = smart_clock_restart_sntp();
          ESP_LOGI("time", "Requested SNTP sync attempt %u after Wi-Fi connect/retry (restart=%s)",
                   (unsigned) id(time_sync_retry_count), restarted ? "true" : "false");
          if (id(show_system_alerts).state) {
            id(system_alert_message) = "SYNC";
            id(system_alert_until) = millis() + 3000;
          }
      - component.update: matrix_display

  - id: alarm_triggered
    mode: restart
    then:
      - lambda: |-
          const float seconds = isnan(id(alarm_message_seconds).state) ? 10.0f : id(alarm_message_seconds).state;
          id(text_message) = "ALARM";
          id(text_message_until) = millis() + (uint32_t) (seconds * 1000.0f);
      - component.update: matrix_display
      - homeassistant.event:
          event: esphome.alarm_triggered
          data:
            device: esp32-smart-clock

sensor:
  - platform: aht10
    variant: AHT20
    temperature:
      name: "Temperature"
      id: aht_temperature
      device_id: sensor_device
      on_value:
        then:
          - lambda: |-
              id(last_aht_sensor_ms) = millis();
    humidity:
      name: "Humidity"
      id: aht_humidity
      device_id: sensor_device
      on_value:
        then:
          - lambda: |-
              id(last_aht_sensor_ms) = millis();
    update_interval: 30s

  - platform: bmp280_i2c
    address: ${bmp280_address}
    temperature:
      name: "BMP280 Temperature"
      id: bmp_temperature
      device_id: sensor_device
      oversampling: 2x
      on_value:
        then:
          - lambda: |-
              id(last_bmp_sensor_ms) = millis();
    pressure:
      name: "Pressure"
      id: bmp_pressure
      device_id: sensor_device
      on_value:
        then:
          - lambda: |-
              id(last_bmp_sensor_ms) = millis();
    update_interval: 30s

update:
  - platform: http_request
    name: "Firmware Update"
    id: firmware_update
    device_id: system_device
    entity_category: config
    icon: "mdi:update"
    source: ${github_release_manifest_url}
    update_interval: 6h

text:
  - platform: template
    name: "Screen Message"
    id: screen_message_text
    device_id: display_device
    icon: "mdi:message-text"
    optimistic: true
    min_length: 0
    max_length: 100
    mode: text
    set_action:
      - lambda: |-
          const float seconds = isnan(id(text_message_seconds).state) ? 10.0f : id(text_message_seconds).state;
          ESP_LOGI("settings", "Screen Message changed to '%s' for %.0f seconds", x.c_str(), seconds);
          id(text_message) = x;
          id(text_message_until) = x.empty() ? 0 : millis() + (uint32_t) (seconds * 1000.0f);
      - component.update: matrix_display

interval:
  # Play small local beeps shortly after they are requested.
  # Keeping this outside on_volume avoids referencing the embedded media file
  # while the media_player component is still being generated.
  - interval: 250ms
    then:
      - if:
          condition:
            lambda: |-
              return id(volume_beep_pending) || id(hourly_beep_pending);
          then:
            - lambda: |-
                const bool volume_beep = id(volume_beep_pending);
                const bool hourly_beep = id(hourly_beep_pending);
                if (id(audio_playback_active) || id(clock_speaker).state == media_player::MEDIA_PLAYER_STATE_PLAYING || id(clock_speaker).state == media_player::MEDIA_PLAYER_STATE_ANNOUNCING) {
                  ESP_LOGI("audio", "Skipping pending beep while audio is active (volume=%s, hourly=%s, state=%d)",
                           volume_beep ? "true" : "false", hourly_beep ? "true" : "false", (int)id(clock_speaker).state);
                  id(volume_beep_pending) = false;
                  id(hourly_beep_pending) = false;
                  return;
                }
                ESP_LOGI("audio", "Playing local beep (volume=%s, hourly=%s, audio_playback_active=false, state=%d)",
                         volume_beep ? "true" : "false", hourly_beep ? "true" : "false", (int)id(clock_speaker).state);
                id(volume_beep_pending) = false;
                id(hourly_beep_pending) = false;
            - if:
                condition:
                  lambda: |-
                    return !id(audio_playback_active) && id(clock_speaker).state != media_player::MEDIA_PLAYER_STATE_PLAYING && id(clock_speaker).state != media_player::MEDIA_PLAYER_STATE_ANNOUNCING;
                then:
                  - media_player.speaker.play_on_device_media_file:
                      media_file: volume_beep
                      announcement: true

  - interval: 1s
    then:
      # Retry SNTP immediately after Wi-Fi connects, then every 15 seconds
      # until either SNTP or Home Assistant has made the system clock valid.
      - if:
          condition:
            and:
              - wifi.connected:
              - lambda: |-
                  auto now = id(ntp_time).now();
                  if (now.is_valid()) {
                    id(time_sync_retry_active) = false;
                    return false;
                  }
                  if (!id(time_sync_retry_active)) {
                    id(time_sync_retry_active) = true;
                  }
                  return id(last_time_sync_retry_ms) == 0
                    || (int32_t) (millis() - id(last_time_sync_retry_ms)) >= 15000;
          then:
            - script.execute: request_time_sync

      # Rotate system health alerts. The Show System Alerts switch is the
      # Home Assistant checkbox that skips these matrix warnings.
      - if:
          condition:
            lambda: |-
              if (!id(show_system_alerts).state) {
                id(system_alert_message).clear();
                id(system_alert_until) = 0;
                return false;
              }
              const float interval_seconds = isnan(id(system_alert_interval_seconds).state)
                ? 10.0f
                : id(system_alert_interval_seconds).state;
              return (int32_t) (millis() - id(last_system_alert_ms)) >= (int32_t) (interval_seconds * 1000.0f);
          then:
            - lambda: |-
                std::string alerts[8];
                size_t count = 0;
                const uint32_t uptime_ms = millis();
                auto clock_now = id(ntp_time).now();
                const uint32_t sensor_stale_ms = 75000;

                if (!id(wifi_component).is_connected()) {
                  alerts[count++] = "NO WIFI";
                } else if (!clock_now.is_valid() && id(time_sync_retry_count) >= 2) {
                  alerts[count++] = "NO NET";
                }

                const bool aht_missing = uptime_ms > 45000
                  && (id(last_aht_sensor_ms) == 0
                    || (int32_t) (uptime_ms - id(last_aht_sensor_ms)) > (int32_t) sensor_stale_ms
                    || isnan(id(aht_temperature).state)
                    || isnan(id(aht_humidity).state));
                const bool bmp_missing = uptime_ms > 45000
                  && (id(last_bmp_sensor_ms) == 0
                    || (int32_t) (uptime_ms - id(last_bmp_sensor_ms)) > (int32_t) sensor_stale_ms
                    || isnan(id(bmp_temperature).state)
                    || isnan(id(bmp_pressure).state));

                if (aht_missing && !id(aht_alert_active)) {
                  ESP_LOGW("sensor", "AHT20 sensor missing or stale; last update was %u ms ago",
                           id(last_aht_sensor_ms) == 0 ? 0 : (unsigned) (uptime_ms - id(last_aht_sensor_ms)));
                } else if (!aht_missing && id(aht_alert_active)) {
                  ESP_LOGI("sensor", "AHT20 sensor recovered");
                }
                if (bmp_missing && !id(bmp_alert_active)) {
                  ESP_LOGW("sensor", "BMP280 sensor missing or stale; last update was %u ms ago",
                           id(last_bmp_sensor_ms) == 0 ? 0 : (unsigned) (uptime_ms - id(last_bmp_sensor_ms)));
                } else if (!bmp_missing && id(bmp_alert_active)) {
                  ESP_LOGI("sensor", "BMP280 sensor recovered");
                }
                id(aht_alert_active) = aht_missing;
                id(bmp_alert_active) = bmp_missing;

                if (aht_missing && bmp_missing) {
                  alerts[count++] = "NO SENSOR";
                } else {
                  if (aht_missing) alerts[count++] = "NO AHT";
                  if (bmp_missing) alerts[count++] = "NO BMP";
                }

                if (!id(speaker_connected).state) {
                  alerts[count++] = "NO SPK";
                }
                if (id(boot_low_power_seen)) {
                  alerts[count++] = "LOW PWR";
                }

                if (count == 0) {
                  id(system_alert_message).clear();
                  id(system_alert_until) = 0;
                  id(last_system_alert_ms) = millis();
                  return;
                }

                static size_t alert_index = 0;
                if (alert_index >= count) {
                  alert_index = 0;
                }
                const float seconds = isnan(id(system_alert_seconds).state) ? 3.0f : id(system_alert_seconds).state;
                id(system_alert_message) = alerts[alert_index++];
                id(system_alert_until) = millis() + (uint32_t) (seconds * 1000.0f);
                id(last_system_alert_ms) = millis();
            - component.update: matrix_display

      # Wi-Fi alert is periodic, not continuous, so the clock remains visible
      # between short NO WIFI warnings.
      - if:
          condition:
            and:
              - lambda: |-
                  return id(show_system_alerts).state;
              - not:
                  wifi.connected:
              - lambda: |-
                  const float interval_seconds = isnan(id(wifi_alert_interval_seconds).state)
                    ? 30.0f
                    : id(wifi_alert_interval_seconds).state;
                  return (int32_t) (millis() - id(last_wifi_alert_ms)) >= (int32_t) (interval_seconds * 1000.0f);
          then:
            - lambda: |-
                const float seconds = isnan(id(wifi_alert_seconds).state) ? 3.0f : id(wifi_alert_seconds).state;
                id(last_wifi_alert_ms) = millis();
                id(wifi_alert_until) = millis() + (uint32_t) (seconds * 1000.0f);
            - component.update: matrix_display
      # Sensor screen is also periodic. Pressure is still exposed to
      # Home Assistant, but the matrix only shows temp + humidity.
      - if:
          condition:
            lambda: |-
              const float interval_seconds = isnan(id(sensor_message_interval_seconds).state)
                ? 30.0f
                : id(sensor_message_interval_seconds).state;
              return (int32_t) (millis() - id(last_sensor_message_ms)) >= (int32_t) (interval_seconds * 1000.0f);
          then:
            - lambda: |-
                const float seconds = isnan(id(sensor_message_seconds).state) ? 3.0f : id(sensor_message_seconds).state;
                id(last_sensor_message_ms) = millis();
                id(sensor_message_until) = millis() + (uint32_t) (seconds * 1000.0f);
            - component.update: matrix_display

number:
  - platform: template
    name: "Display Brightness"
    id: display_brightness
    device_id: display_device
    entity_category: config
    icon: "mdi:brightness-6"
    optimistic: true
    restore_value: true
    min_value: 0
    max_value: 15
    step: 1
    initial_value: 3
    set_action:
      - lambda: |-
          ESP_LOGI("settings", "Display Brightness changed to %.0f", x);
          id(matrix_display).intensity((uint8_t) x);
      - component.update: matrix_display

  # Runtime-tunable display timing controls exposed to Home Assistant.
  # Durations control how long a temporary screen stays visible; intervals
  # control how often periodic status screens are requested.
  - platform: template
    name: "System Alert Seconds"
    id: system_alert_seconds
    device_id: system_device
    entity_category: config
    icon: "mdi:timer-alert-outline"
    optimistic: true
    restore_value: true
    min_value: 1
    max_value: 30
    step: 1
    initial_value: 3
    set_action:
      - lambda: |-
          ESP_LOGI("settings", "System Alert Seconds changed to %.0f", x);

