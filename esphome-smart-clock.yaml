substitutions:
  device_name: esp32-smart-clock
  friendly_name: ESP32 Smart Clock
  firmware_version: "0.1.0-beta.10"
  github_repo: NirBY/ESP32_Smart_Clock
  github_release_manifest_url: "https://raw.githubusercontent.com/${github_repo}/firmware-latest/firmware-manifest.json"
  bmp280_address: "0x77"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  project:
    name: nirby.esp32_smart_clock
    version: "${firmware_version}"
  build_path: C:/Users/nirbe/.esphome/build/${device_name}
  devices:
    - id: display_device
      name: "ESP32 Smart Clock Display"
    - id: alarm_device
      name: "ESP32 Smart Clock Alarm"
    - id: audio_device
      name: "ESP32 Smart Clock Audio"
    - id: system_device
      name: "ESP32 Smart Clock System"
    - id: sensor_device
      name: "ESP32 Smart Clock Sensors"
  includes:
    - src/system_health.h
  on_boot:
    priority: -100
    then:
      - lambda: |-
          id(time_sync_retry_active) = true;
          id(boot_low_power_seen) = smart_clock_booted_from_brownout();
          if (!isnan(id(display_brightness).state)) {
            id(matrix_display).intensity((uint8_t) id(display_brightness).state);
          }
      - component.update: matrix_display

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    advanced:
      minimum_chip_revision: "3.1"
      sram1_as_iram: true

logger:
  # DEBUG logging keeps more strings/buffers active and can steal CPU while audio
  # is playing. INFO still keeps useful boot and troubleshooting messages.
  level: INFO
  logs:
    audio: INFO
    api: INFO
    component: INFO
    i2s_audio.speaker: INFO
    media_player: INFO
    ring_buffer: WARN
    sensor: INFO
    settings: INFO
    speaker: INFO
    speaker_media_player: INFO
    time: INFO
    wifi: INFO
    aht10: WARN
    bmp280: WARN

api:
  encryption:
    key: !secret api_encryption_key
  # Home Assistant is normally the only API client. Smaller queues/connections
  # reduce RAM pressure on the non-PSRAM ESP32.
  max_connections: 2
  max_send_queue: 4
  actions:
    - action: show_message
      variables:
        message: string
      then:
        - lambda: |-
            const float seconds = isnan(id(text_message_seconds).state) ? 10.0f : id(text_message_seconds).state;
            ESP_LOGI("settings", "Screen message changed to '%s' for %.0f seconds", message.c_str(), seconds);
            id(text_message) = message;
            id(text_message_until) = message.empty() ? 0 : millis() + (uint32_t) (seconds * 1000.0f);
        - component.update: matrix_display
    - action: clear_message
      then:
        - lambda: |-
            ESP_LOGI("settings", "Screen message cleared");
            id(text_message).clear();
            id(text_message_until) = 0;
        - component.update: matrix_display

ota:
  - platform: esphome
  - platform: http_request

http_request:
  # GitHub release asset URLs redirect to long signed URLs. Keep redirects on
  # and use a larger receive buffer so update checks do not fail on Location.
  follow_redirects: true
  redirect_limit: 5
  timeout: 30s
  buffer_size_rx: 4096
  buffer_size_tx: 512

wifi:
  id: wifi_component
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  on_connect:
    - lambda: |-
        ESP_LOGI("time", "Wi-Fi connected; requesting immediate time synchronization");
        id(time_sync_retry_active) = true;
        id(last_time_sync_retry_ms) = 0;
        id(time_sync_retry_count) = 0;
    - script.execute: request_time_sync
  on_disconnect:
    - lambda: |-
        ESP_LOGW("time", "Wi-Fi disconnected; time synchronization will retry after reconnect");
        id(time_sync_retry_active) = true;
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret fallback_ap_password

captive_portal:

globals:
  # Temporary display state. Each *_until value stores a millis() deadline;
  # the display lambda falls back to the clock after the deadline expires.
  - id: text_message
    type: std::string
    restore_value: no
    max_restore_data_length: 100
    initial_value: '""'
  - id: text_message_until
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: sensor_message_until
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: wifi_alert_until
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: date_message_until
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: media_message
    type: std::string
    restore_value: no
    max_restore_data_length: 64
    initial_value: '""'
  - id: media_message_until
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: system_alert_message
    type: std::string
    restore_value: no
    max_restore_data_length: 32
    initial_value: '""'
  - id: system_alert_until
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: last_sensor_message_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: last_wifi_alert_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: last_system_alert_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: last_time_sync_retry_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: time_sync_retry_count
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: time_sync_retry_active
    type: bool
    restore_value: no
    initial_value: 'true'
  - id: boot_low_power_seen
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: last_aht_sensor_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: last_bmp_sensor_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: aht_alert_active
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: bmp_alert_active
    type: bool
    restore_value: no
    initial_value: 'false'
  # Volume changes are handled in two steps. The media player's on_volume
  # trigger sets this flag, and an interval plays the beep outside that trigger
  # to avoid an ESPHome code-generation circular dependency.
  - id: volume_beep_pending
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: hourly_beep_pending
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: audio_playback_active
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: media_stream_playing
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: media_playback_started_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: media_playback_failed
    type: bool
    restore_value: no
    initial_value: 'false'

i2c:
