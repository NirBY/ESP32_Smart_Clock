time:
  - platform: sntp
    id: ntp_time
    servers:
      - 0.pool.ntp.org
      - 1.pool.ntp.org
      - 2.pool.ntp.org
    update_interval: 1h
    on_time:
      - seconds: 0
        then:
          - if:
              condition:
                lambda: |-
                  auto now = id(ntp_time).now();
                  return now.is_valid()
                    && id(alarm_enabled).state
                    && now.hour == (int) id(alarm_hour).state
                    && now.minute == (int) id(alarm_minute).state;
              then:
                - script.execute: alarm_triggered
      - seconds: 0
        minutes: 0
        then:
          - lambda: |-
              const float seconds = isnan(id(date_message_seconds).state) ? 3.0f : id(date_message_seconds).state;
              id(date_message_until) = millis() + (uint32_t) (seconds * 1000.0f);
          - component.update: matrix_display

script:
  - id: alarm_triggered
    mode: restart
    then:
      - lambda: |-
          const float seconds = isnan(id(alarm_message_seconds).state) ? 10.0f : id(alarm_message_seconds).state;
          id(text_message) = "ALARM";
          id(text_message_until) = millis() + (uint32_t) (seconds * 1000.0f);
      - component.update: matrix_display
      - homeassistant.event:
          event: esphome.alarm_triggered
          data:
            device: esp32-smart-clock

sensor:
  - platform: aht10
    variant: AHT20
    temperature:
      name: "Temperature"
      id: aht_temperature
    humidity:
      name: "Humidity"
      id: aht_humidity
    update_interval: 30s

  - platform: bmp280_i2c
    address: ${bmp280_address}
    temperature:
      name: "BMP280 Temperature"
      id: bmp_temperature
      oversampling: 2x
    pressure:
      name: "Pressure"
      id: bmp_pressure
    update_interval: 30s

text:
  - platform: template
    name: "Screen Message"
    id: screen_message_text
    icon: "mdi:message-text"
    optimistic: true
    min_length: 0
    max_length: 100
    mode: text
    set_action:
      - lambda: |-
          const float seconds = isnan(id(text_message_seconds).state) ? 10.0f : id(text_message_seconds).state;
          ESP_LOGI("settings", "Screen Message changed to '%s' for %.0f seconds", x.c_str(), seconds);
          id(text_message) = x;
          id(text_message_until) = x.empty() ? 0 : millis() + (uint32_t) (seconds * 1000.0f);
      - component.update: matrix_display

interval:
  # Play the volume feedback beep shortly after Home Assistant changes volume.
  # Keeping this outside on_volume avoids referencing the embedded media file
  # while the media_player component is still being generated.
  - interval: 250ms
    then:
      - if:
          condition:
            lambda: |-
              return id(volume_beep_pending);
          then:
            - lambda: |-
                ESP_LOGI("audio", "Playing volume feedback beep");
                id(volume_beep_pending) = false;
            - media_player.speaker.play_on_device_media_file:
                media_file: volume_beep
                announcement: true

  - interval: 1s
    then:
      # Wi-Fi alert is periodic, not continuous, so the clock remains visible
      # between short NO WIFI warnings.
      - if:
          condition:
            and:
              - not:
                  wifi.connected:
              - lambda: |-
                  const float interval_seconds = isnan(id(wifi_alert_interval_seconds).state)
                    ? 30.0f
                    : id(wifi_alert_interval_seconds).state;
                  return (int32_t) (millis() - id(last_wifi_alert_ms)) >= (int32_t) (interval_seconds * 1000.0f);
          then:
            - lambda: |-
                const float seconds = isnan(id(wifi_alert_seconds).state) ? 3.0f : id(wifi_alert_seconds).state;
                id(last_wifi_alert_ms) = millis();
                id(wifi_alert_until) = millis() + (uint32_t) (seconds * 1000.0f);
            - component.update: matrix_display
      # Sensor screen is also periodic. Pressure is still exposed to
      # Home Assistant, but the matrix only shows temp + humidity.
      - if:
          condition:
            lambda: |-
              const float interval_seconds = isnan(id(sensor_message_interval_seconds).state)
                ? 30.0f
                : id(sensor_message_interval_seconds).state;
              return (int32_t) (millis() - id(last_sensor_message_ms)) >= (int32_t) (interval_seconds * 1000.0f);
          then:
            - lambda: |-
                const float seconds = isnan(id(sensor_message_seconds).state) ? 3.0f : id(sensor_message_seconds).state;
                id(last_sensor_message_ms) = millis();
                id(sensor_message_until) = millis() + (uint32_t) (seconds * 1000.0f);
            - component.update: matrix_display

number:
  - platform: template
    name: "Display Brightness"
    id: display_brightness
    icon: "mdi:brightness-6"
    optimistic: true
    restore_value: true
    min_value: 0
    max_value: 15
    step: 1
    initial_value: 3
    set_action:
      - lambda: |-
          ESP_LOGI("settings", "Display Brightness changed to %.0f", x);
          id(matrix_display).intensity((uint8_t) x);
      - component.update: matrix_display

  # Runtime-tunable display timing controls exposed to Home Assistant.
  # Durations control how long a temporary screen stays visible; intervals
  # control how often periodic status screens are requested.
  - platform: template
    name: "Screen Message Seconds"
    id: text_message_seconds
    icon: "mdi:timer-outline"
    optimistic: true
    restore_value: true
    min_value: 1
    max_value: 60
    step: 1
    initial_value: 10
    set_action:
      - lambda: |-
          ESP_LOGI("settings", "Screen Message Seconds changed to %.0f", x);

  - platform: template
    name: "Media Message Seconds"
