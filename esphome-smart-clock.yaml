switch:
  - platform: template
    name: "Alarm Enabled"
    id: alarm_enabled
    icon: "mdi:alarm"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - lambda: |-
          ESP_LOGI("settings", "Alarm Enabled changed to ON");
    turn_off_action:
      - lambda: |-
          ESP_LOGI("settings", "Alarm Enabled changed to OFF");

display:
  - platform: max7219digit
    id: matrix_display
    cs_pin: GPIO5
    num_chips: 4
    intensity: 3
    scroll_enable: true
    scroll_mode: CONTINUOUS
    scroll_speed: 80ms
    scroll_delay: 500ms
    update_interval: 80ms
    lambda: |-
      const uint32_t now_ms = millis();

      // Use signed subtraction so millis() wraparound does not make expired
      // temporary screens look active again.
      auto active_until = [now_ms](uint32_t until) -> bool {
        return (int32_t) (until - now_ms) > 0;
      };

      // ESPHome's font renderer draws left-to-right. For short Hebrew messages
      // we reverse UTF-8 codepoints first so the text is readable on the matrix.
      auto has_hebrew = [](const std::string &text) -> bool {
        for (size_t i = 0; i + 1 < text.size(); i++) {
          const uint8_t b0 = text[i];
          const uint8_t b1 = text[i + 1];
          if (b0 == 0xD7 && b1 >= 0x90 && b1 <= 0xAA) {
            return true;
          }
        }
        return false;
      };
      auto reverse_utf8 = [](const std::string &text) -> std::string {
        struct Utf8Slice {
          size_t start;
          size_t len;
        };
        Utf8Slice chars[100];
        size_t char_count = 0;
        for (size_t i = 0; i < text.size();) {
          size_t len = 1;
          const uint8_t c = text[i];
          if ((c & 0xE0) == 0xC0) {
            len = 2;
          } else if ((c & 0xF0) == 0xE0) {
            len = 3;
          } else if ((c & 0xF8) == 0xF0) {
            len = 4;
          }
          if (i + len > text.size()) {
            len = 1;
          }
          if (char_count >= sizeof(chars) / sizeof(chars[0])) {
            break;
          }
          chars[char_count++] = {i, len};
          i += len;
        }

        std::string out;
        out.reserve(text.size());
        for (size_t i = char_count; i > 0; i--) {
          const auto &ch = chars[i - 1];
          out.append(text, ch.start, ch.len);
        }
        return out;
      };
      auto print_text = [&](const std::string &text, bool text_has_hebrew) {
        if (text_has_hebrew) {
          const std::string rtl = reverse_utf8(text);
          it.print(0, 0, id(matrix_font), rtl.c_str());
        } else {
          it.print(0, 0, id(matrix_font), text.c_str());
        }
      };
      auto pixel_glyph = [](char ch, uint8_t rows[7]) -> int {
        for (int i = 0; i < 7; i++) {
          rows[i] = 0;
        }
        if (ch >= 'a' && ch <= 'z') {
          ch = ch - 'a' + 'A';
        }
        switch (ch) {
          case ' ': return 2;
          case '0': rows[0]=0b111; rows[1]=0b101; rows[2]=0b101; rows[3]=0b101; rows[4]=0b101; rows[5]=0b101; rows[6]=0b111; return 3;
          case '1': rows[0]=0b010; rows[1]=0b110; rows[2]=0b010; rows[3]=0b010; rows[4]=0b010; rows[5]=0b010; rows[6]=0b111; return 3;
          case '2': rows[0]=0b111; rows[1]=0b001; rows[2]=0b001; rows[3]=0b111; rows[4]=0b100; rows[5]=0b100; rows[6]=0b111; return 3;
          case '3': rows[0]=0b111; rows[1]=0b001; rows[2]=0b001; rows[3]=0b111; rows[4]=0b001; rows[5]=0b001; rows[6]=0b111; return 3;
          case '4': rows[0]=0b101; rows[1]=0b101; rows[2]=0b101; rows[3]=0b111; rows[4]=0b001; rows[5]=0b001; rows[6]=0b001; return 3;
          case '5': rows[0]=0b111; rows[1]=0b100; rows[2]=0b100; rows[3]=0b111; rows[4]=0b001; rows[5]=0b001; rows[6]=0b111; return 3;
          case '6': rows[0]=0b111; rows[1]=0b100; rows[2]=0b100; rows[3]=0b111; rows[4]=0b101; rows[5]=0b101; rows[6]=0b111; return 3;
          case '7': rows[0]=0b111; rows[1]=0b001; rows[2]=0b001; rows[3]=0b010; rows[4]=0b010; rows[5]=0b010; rows[6]=0b010; return 3;
          case '8': rows[0]=0b111; rows[1]=0b101; rows[2]=0b101; rows[3]=0b111; rows[4]=0b101; rows[5]=0b101; rows[6]=0b111; return 3;
          case '9': rows[0]=0b111; rows[1]=0b101; rows[2]=0b101; rows[3]=0b111; rows[4]=0b001; rows[5]=0b001; rows[6]=0b111; return 3;
          case 'A': rows[0]=0b010; rows[1]=0b101; rows[2]=0b101; rows[3]=0b111; rows[4]=0b101; rows[5]=0b101; rows[6]=0b101; return 3;
          case 'B': rows[0]=0b110; rows[1]=0b101; rows[2]=0b101; rows[3]=0b110; rows[4]=0b101; rows[5]=0b101; rows[6]=0b110; return 3;
          case 'C': rows[0]=0b111; rows[1]=0b100; rows[2]=0b100; rows[3]=0b100; rows[4]=0b100; rows[5]=0b100; rows[6]=0b111; return 3;
          case 'D': rows[0]=0b110; rows[1]=0b101; rows[2]=0b101; rows[3]=0b101; rows[4]=0b101; rows[5]=0b101; rows[6]=0b110; return 3;
          case 'E': rows[0]=0b111; rows[1]=0b100; rows[2]=0b100; rows[3]=0b110; rows[4]=0b100; rows[5]=0b100; rows[6]=0b111; return 3;
          case 'F': rows[0]=0b111; rows[1]=0b100; rows[2]=0b100; rows[3]=0b110; rows[4]=0b100; rows[5]=0b100; rows[6]=0b100; return 3;
          case 'G': rows[0]=0b111; rows[1]=0b100; rows[2]=0b100; rows[3]=0b101; rows[4]=0b101; rows[5]=0b101; rows[6]=0b111; return 3;
          case 'H': rows[0]=0b101; rows[1]=0b101; rows[2]=0b101; rows[3]=0b111; rows[4]=0b101; rows[5]=0b101; rows[6]=0b101; return 3;
          case 'I': rows[0]=0b111; rows[1]=0b010; rows[2]=0b010; rows[3]=0b010; rows[4]=0b010; rows[5]=0b010; rows[6]=0b111; return 3;
          case 'J': rows[0]=0b001; rows[1]=0b001; rows[2]=0b001; rows[3]=0b001; rows[4]=0b101; rows[5]=0b101; rows[6]=0b111; return 3;
          case 'K': rows[0]=0b101; rows[1]=0b101; rows[2]=0b110; rows[3]=0b100; rows[4]=0b110; rows[5]=0b101; rows[6]=0b101; return 3;
          case 'L': rows[0]=0b100; rows[1]=0b100; rows[2]=0b100; rows[3]=0b100; rows[4]=0b100; rows[5]=0b100; rows[6]=0b111; return 3;
          case 'M': rows[0]=0b101; rows[1]=0b111; rows[2]=0b111; rows[3]=0b101; rows[4]=0b101; rows[5]=0b101; rows[6]=0b101; return 3;
          case 'N': rows[0]=0b101; rows[1]=0b111; rows[2]=0b111; rows[3]=0b111; rows[4]=0b101; rows[5]=0b101; rows[6]=0b101; return 3;
          case 'O': rows[0]=0b111; rows[1]=0b101; rows[2]=0b101; rows[3]=0b101; rows[4]=0b101; rows[5]=0b101; rows[6]=0b111; return 3;
          case 'P': rows[0]=0b111; rows[1]=0b101; rows[2]=0b101; rows[3]=0b111; rows[4]=0b100; rows[5]=0b100; rows[6]=0b100; return 3;
          case 'Q': rows[0]=0b111; rows[1]=0b101; rows[2]=0b101; rows[3]=0b101; rows[4]=0b111; rows[5]=0b001; rows[6]=0b001; return 3;
          case 'R': rows[0]=0b111; rows[1]=0b101; rows[2]=0b101; rows[3]=0b111; rows[4]=0b110; rows[5]=0b101; rows[6]=0b101; return 3;
          case 'S': rows[0]=0b111; rows[1]=0b100; rows[2]=0b100; rows[3]=0b111; rows[4]=0b001; rows[5]=0b001; rows[6]=0b111; return 3;
          case 'T': rows[0]=0b111; rows[1]=0b010; rows[2]=0b010; rows[3]=0b010; rows[4]=0b010; rows[5]=0b010; rows[6]=0b010; return 3;
          case 'U': rows[0]=0b101; rows[1]=0b101; rows[2]=0b101; rows[3]=0b101; rows[4]=0b101; rows[5]=0b101; rows[6]=0b111; return 3;
          case 'V': rows[0]=0b101; rows[1]=0b101; rows[2]=0b101; rows[3]=0b101; rows[4]=0b101; rows[5]=0b101; rows[6]=0b010; return 3;
          case 'W': rows[0]=0b101; rows[1]=0b101; rows[2]=0b101; rows[3]=0b101; rows[4]=0b111; rows[5]=0b111; rows[6]=0b101; return 3;
          case 'X': rows[0]=0b101; rows[1]=0b101; rows[2]=0b010; rows[3]=0b010; rows[4]=0b010; rows[5]=0b101; rows[6]=0b101; return 3;
          case 'Y': rows[0]=0b101; rows[1]=0b101; rows[2]=0b101; rows[3]=0b010; rows[4]=0b010; rows[5]=0b010; rows[6]=0b010; return 3;
          case 'Z': rows[0]=0b111; rows[1]=0b001; rows[2]=0b001; rows[3]=0b010; rows[4]=0b100; rows[5]=0b100; rows[6]=0b111; return 3;
          case '-': rows[3]=0b111; return 3;
          case '.': rows[6]=0b010; return 3;
          case ':': rows[2]=0b010; rows[5]=0b010; return 3;
          case '/': rows[0]=0b001; rows[1]=0b001; rows[2]=0b010; rows[3]=0b010; rows[4]=0b010; rows[5]=0b100; rows[6]=0b100; return 3;
          case '%': rows[0]=0b11001; rows[1]=0b11010; rows[2]=0b00100; rows[3]=0b01000; rows[4]=0b01011; rows[5]=0b10011; rows[6]=0b00000; return 5;
          default: return 0;
        }
      };
      auto draw_pixel_text = [&](const std::string &text, bool text_has_hebrew) -> bool {
        if (text.empty() || text_has_hebrew) {
          return false;
        }

        // First measure every glyph. If any character is unsupported, let the
        // ESPHome font renderer handle the whole string instead.
        struct PixelGlyph {
          size_t start;
          size_t len;
          int width;
          char ascii;
        };
        PixelGlyph glyphs[100];
        size_t glyph_count = 0;
        int text_width = 0;
        for (size_t i = 0; i < text.size();) {
          uint8_t rows[7];
          char ascii = 0;
          size_t len = 1;
          int width = 0;

          const uint8_t b0 = text[i];
          if (b0 < 0x80) {
            ascii = (char) b0;
            width = pixel_glyph(ascii, rows);
          } else {
            return false;
          }

          if (width == 0) {
            return false;
          }
          if (glyph_count >= 100) {
            return false;
          }
          glyphs[glyph_count++] = {i, len, width, ascii};
          text_width += width;
          i += len;
        }

        const int gaps = glyph_count > 1 ? glyph_count - 1 : 0;
        auto glyph_at = [&](size_t visual_index) -> PixelGlyph {
          if (text_has_hebrew) {
            return glyphs[glyph_count - 1 - visual_index];
          }
          return glyphs[visual_index];
        };
        auto draw_glyph = [&](int x, const PixelGlyph &glyph) {
          uint8_t rows[7];
          const int width = pixel_glyph(glyph.ascii, rows);
          for (int y = 0; y < 7; y++) {
            for (int col = 0; col < width; col++) {
              const int px = x + col;
              if (px >= 0 && px < 32 && (rows[y] & (1 << (width - 1 - col)))) {
                it.draw_pixel_at(px, y, Color::WHITE);
              }
            }
          }
        };

        if (text_width + gaps <= 32) {
          // Short messages are spread across all 32 columns so the display does
          // not look like it is using only one side of the matrix.
          const int extra = 32 - text_width - gaps;
          int x = 0;
          for (size_t i = 0; i < glyph_count; i++) {
            const PixelGlyph glyph = glyph_at(i);
            draw_glyph(x, glyph);
            if (i + 1 < glyph_count) {
              const int spread = gaps > 0 ? extra / gaps + ((int) i < (extra % gaps) ? 1 : 0) : 0;
              x += glyph.width + 1 + spread;
            }
          }
        } else {
          // Longer messages use the same pixel glyphs but scroll manually. This
          // keeps English/number text visually consistent with short messages.
          const int scroll_span = text_width + gaps + 33;
          int x = 32 - ((now_ms / 80) % scroll_span);
          for (size_t i = 0; i < glyph_count; i++) {
            const PixelGlyph glyph = glyph_at(i);
            draw_glyph(x, glyph);
            x += glyph.width + 1;
          }
        }
        return true;
      };

      // Prefer the custom full-width pixel renderer for supported ASCII text.
      // Fall back to the font renderer for Hebrew and unsupported characters.
      auto draw_hebrew_text = [&](const std::string &text) -> bool {
        struct Utf8Slice {
          size_t start;
          size_t len;
          int width;
        };
        Utf8Slice chars[100];
        size_t char_count = 0;
        int text_width = 0;

        for (size_t i = 0; i < text.size();) {
          size_t len = 1;
          const uint8_t c = text[i];
          if ((c & 0xE0) == 0xC0) {
            len = 2;
          } else if ((c & 0xF0) == 0xE0) {
            len = 3;
          } else if ((c & 0xF8) == 0xF0) {
            len = 4;
          }
          if (i + len > text.size() || char_count >= sizeof(chars) / sizeof(chars[0])) {
            return false;
          }

          const int glyph_width = (len == 1 && text[i] == ' ') ? 3 : 5;
          chars[char_count++] = {i, len, glyph_width};
          text_width += glyph_width;
          i += len;
        }

        if (char_count == 0) {
          return false;
        }

        // Render each UTF-8 character with the real Hebrew font, but place the
        // characters ourselves. Short Hebrew messages fill the whole matrix;
        // longer Hebrew messages scroll from right to left.
        int x = 0;
        const bool spread = char_count <= 7 && text_width + (int) char_count - 1 <= 32;
        const int gaps = char_count > 1 ? (int) char_count - 1 : 0;
        const int extra = spread ? 32 - text_width - gaps : 0;

        if (!spread) {
          const int scroll_span = text_width + gaps + 33;
          x = 32 - ((now_ms / 80) % scroll_span);
        }

        for (size_t i = 0; i < char_count; i++) {
          const auto &ch = chars[char_count - 1 - i];
          std::string glyph;
          glyph.reserve(ch.len);
          glyph.append(text, ch.start, ch.len);

          if (x > -8 && x < 32) {
            it.print(x, 0, id(matrix_font), glyph.c_str());
          }

          if (i + 1 < char_count) {
            const int spread_gap = spread && gaps > 0
              ? extra / gaps + ((int) i < (extra % gaps) ? 1 : 0)
              : 0;
            x += ch.width + 1 + spread_gap;
          }
        }
        return true;
      };

      auto show_text = [&](const std::string &text) {
        const bool text_has_hebrew = has_hebrew(text);
        if (text_has_hebrew && draw_hebrew_text(text)) {
          return;
        }
        if (!draw_pixel_text(text, text_has_hebrew)) {
          print_text(text, text_has_hebrew);
        }
      };

      auto draw_small_glyph = [&](int x, char ch) {
        uint8_t rows[7];
        const int width = pixel_glyph(ch, rows);
        if (width == 0) {
          return;
        }
        for (int y = 0; y < 7; y++) {
          for (int col = 0; col < width; col++) {
            if (rows[y] & (1 << (width - 1 - col))) {
              it.draw_pixel_at(x + col, y, Color::WHITE);
            }
          }
        }
      };

      auto draw_degree = [&](int x) {
        it.draw_pixel_at(x, 0, Color::WHITE);
        it.draw_pixel_at(x + 1, 0, Color::WHITE);
        it.draw_pixel_at(x, 1, Color::WHITE);
        it.draw_pixel_at(x + 1, 1, Color::WHITE);
      };

      // Fixed-width sensor screen. A string like "24C 57.4%" is too wide for
      // the full-width text renderer and would scroll, so this draws the
      // compact "24°C 57%" layout directly into known columns.
      auto draw_sensor_screen = [&]() {
        int temp = isnan(id(aht_temperature).state) ? 0 : (int) roundf(id(aht_temperature).state);
        int humidity = isnan(id(aht_humidity).state) ? 0 : (int) roundf(id(aht_humidity).state);
        temp = temp < 0 ? 0 : (temp > 99 ? 99 : temp);
        humidity = humidity < 0 ? 0 : (humidity > 99 ? 99 : humidity);

        draw_small_glyph(0, '0' + (temp / 10));
        draw_small_glyph(4, '0' + (temp % 10));
        draw_degree(8);
        draw_small_glyph(11, 'C');

        draw_small_glyph(17, '0' + (humidity / 10));
        draw_small_glyph(21, '0' + (humidity % 10));
        draw_small_glyph(27, '%');
      };

      // The clock uses a separate 4-pixel-wide digit set so HH:MM:SS fills the
      // matrix exactly without relying on font metrics.
      auto draw_digit = [&](int x, int value) {
        static const uint8_t digits[10][7] = {
          {0b1111, 0b1001, 0b1001, 0b1001, 0b1001, 0b1001, 0b1111},
          {0b0010, 0b0110, 0b0010, 0b0010, 0b0010, 0b0010, 0b0111},
          {0b1110, 0b0001, 0b0001, 0b1110, 0b1000, 0b1000, 0b1111},
          {0b1110, 0b0001, 0b0001, 0b0110, 0b0001, 0b0001, 0b1110},
          {0b1001, 0b1001, 0b1001, 0b1111, 0b0001, 0b0001, 0b0001},
          {0b1111, 0b1000, 0b1000, 0b1110, 0b0001, 0b0001, 0b1110},
          {0b0111, 0b1000, 0b1000, 0b1110, 0b1001, 0b1001, 0b0110},
          {0b1111, 0b0001, 0b0010, 0b0010, 0b0100, 0b0100, 0b0100},
          {0b0110, 0b1001, 0b1001, 0b0110, 0b1001, 0b1001, 0b0110},
          {0b0110, 0b1001, 0b1001, 0b0111, 0b0001, 0b0001, 0b1110},
        };

        if (value < 0 || value > 9) {
          return;
        }
        for (int y = 0; y < 7; y++) {
          for (int col = 0; col < 4; col++) {
            if (digits[value][y] & (1 << (3 - col))) {
              it.draw_pixel_at(x + col, y, Color::WHITE);
            }
          }
        }
      };
      auto draw_colon = [&](int x) {
        it.draw_pixel_at(x, 2, Color::WHITE);
        it.draw_pixel_at(x, 5, Color::WHITE);
      };
      auto draw_clock = [&](int hour, int minute, int second) {
        draw_digit(0, hour / 10);
        draw_digit(5, hour % 10);
        draw_colon(10);
        draw_digit(12, minute / 10);
        draw_digit(17, minute % 10);
        draw_colon(22);
        draw_digit(23, second / 10);
        draw_digit(28, second % 10);
      };

      // Display priority: the first active branch wins. This keeps explicit
      // Home Assistant messages above automatic status screens.
      if (active_until(id(text_message_until)) && !id(text_message).empty()) {
        show_text(id(text_message));
        return;
      }

      if (active_until(id(media_message_until)) && !id(media_message).empty()) {
        show_text(id(media_message));
        return;
      }

      if (active_until(id(wifi_alert_until))) {
        show_text("NO WIFI");
        return;
      }

      // The date screen only renders after NTP is valid. If time is not ready,
      // it falls through to the normal clock fallback below.
      if (active_until(id(date_message_until))) {
        auto date_now = id(ntp_time).now();
        if (date_now.is_valid()) {
          it.strftime(0, 0, id(matrix_font), "%a %d/%m", date_now);
          return;
        }
      }

      // Sensor values use a fixed, non-scrolling layout. Missing readings show
      // as 00°C 00% instead of hiding the sensor screen.
      if (active_until(id(sensor_message_until))) {
        draw_sensor_screen();
        return;
      }

      // Default display. If NTP has not synced yet, show an obvious placeholder
      // instead of stale or invalid time.
      auto now = id(ntp_time).now();
      if (now.is_valid()) {
        draw_clock(now.hour, now.minute, now.second);
      } else {
        show_text("--:--");
      }

speaker:
  # Audio is split into announcement and media pipelines, then mixed back into
  # one physical I2S speaker. Announcements can interrupt/duck media without
  # changing the main playback path.
  - platform: i2s_audio
    id: i2s_speaker
    dac_type: external
    i2s_dout_pin: GPIO25
    channel: right
    sample_rate: 16000
    bits_per_sample: 16bit
    i2s_comm_fmt: stand_msb
    buffer_duration: 500ms
    timeout: 250ms

  - platform: mixer
    id: audio_mixer
    output_speaker: i2s_speaker
    source_speakers:
      - id: announcement_mixer_input
        buffer_duration: 50ms
        timeout: 250ms
      - id: media_mixer_input
        buffer_duration: 50ms
        timeout: 250ms

  - platform: resampler
    id: announcement_speaker
    output_speaker: announcement_mixer_input
    buffer_duration: 50ms
    filters: 16
    taps: 16

  - platform: resampler
    id: media_speaker
    output_speaker: media_mixer_input
    buffer_duration: 50ms
    filters: 16
    taps: 16

media_player:
  - platform: speaker
    name: "Speaker"
    id: clock_speaker
    files:
      # Tiny local WAV used for volume feedback. It plays as an announcement so
      # the user hears the current volume immediately after changing it.
      - id: volume_beep
        file: media/volume-beep.wav
    on_play:
      - lambda: |-
          const float seconds = isnan(id(media_message_seconds).state) ? 10.0f : id(media_message_seconds).state;
          ESP_LOGI("audio", "Media playback started: media_pipeline=WAV 16000Hz mono, i2s=right stand_msb 16bit, buffer=500ms, timeout=250ms");
          id(media_message) = "MUSIC";
          id(media_message_until) = millis() + (uint32_t) (seconds * 1000.0f);
      - component.update: matrix_display
    on_announcement:
      - lambda: |-
          const float seconds = isnan(id(media_message_seconds).state) ? 10.0f : id(media_message_seconds).state;
          ESP_LOGI("audio", "Announcement playback started: announcement_pipeline=WAV 16000Hz mono, i2s=right stand_msb 16bit, buffer=500ms, timeout=250ms");
          id(media_message) = "SPEAKER";
          id(media_message_until) = millis() + (uint32_t) (seconds * 1000.0f);
      - component.update: matrix_display
    on_pause:
      - lambda: |-
          ESP_LOGI("audio", "Media playback paused");
          id(media_message).clear();
          id(media_message_until) = 0;
      - component.update: matrix_display
    on_idle:
      - lambda: |-
          ESP_LOGI("audio", "Media player idle");
          id(media_message).clear();
          id(media_message_until) = 0;
      - component.update: matrix_display
    on_turn_off:
      - lambda: |-
          ESP_LOGI("audio", "Media player turned off");
          id(media_message).clear();
          id(media_message_until) = 0;
      - component.update: matrix_display
    on_volume:
      - lambda: |-
          ESP_LOGI("settings", "Speaker volume changed to %.0f%%", x * 100.0f);
          if (millis() < 15000) {
            return;
          }
          // Defer actual playback to the 250ms interval above. Calling
          // play_on_device_media_file directly here creates a codegen cycle.
          id(volume_beep_pending) = true;
    buffer_size: 12000
    announcement_pipeline:
      speaker: announcement_speaker
      format: WAV
      sample_rate: 16000
      num_channels: 1
    media_pipeline:
      speaker: media_speaker
      format: WAV
      sample_rate: 16000
      num_channels: 1
