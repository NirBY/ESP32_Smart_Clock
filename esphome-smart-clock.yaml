display:
  - platform: max7219digit
    id: matrix_display
    cs_pin: GPIO5
    num_chips: 4
    intensity: 3
    scroll_enable: true
    scroll_mode: CONTINUOUS
    scroll_speed: 80ms
    scroll_delay: 500ms
    update_interval: 80ms
    lambda: |-
      const uint32_t now_ms = millis();

      // Use signed subtraction so millis() wraparound does not make expired
      // temporary screens look active again.
      auto active_until = [now_ms](uint32_t until) -> bool {
        return (int32_t) (until - now_ms) > 0;
      };

      auto get_scroll_x = [&now_ms](const std::string &text, int text_width, int gaps, bool is_rtl) -> int {
        static std::string last_scrolled_text = "";
        static uint32_t scroll_start_ms = 0;
        static uint32_t last_called_ms = 0;

        if (text != last_scrolled_text || (now_ms - last_called_ms) > 250) {
          last_scrolled_text = text;
          scroll_start_ms = now_ms;
        }
        last_called_ms = now_ms;

        const int W = text_width + gaps;
        const int max_scroll = W - 32;
        if (max_scroll <= 0) {
          return is_rtl ? 32 - W : 0;
        }

        const int pause_frames = 15; // 1.2 seconds pause
        const int total_frames = pause_frames + max_scroll + pause_frames;
        const int frame = ((now_ms - scroll_start_ms) / 80) % total_frames;

        int scroll_amount = 0;
        if (frame < pause_frames) {
          scroll_amount = 0;
        } else if (frame < pause_frames + max_scroll) {
          scroll_amount = frame - pause_frames;
        } else {
          scroll_amount = max_scroll;
        }

        if (is_rtl) {
          return 32 - W + scroll_amount;
        } else {
          return 0 - scroll_amount;
        }
      };

      // ESPHome's font renderer draws left-to-right. For short Hebrew messages
      // we reverse UTF-8 codepoints first so the text is readable on the matrix.
      auto has_hebrew = [](const std::string &text) -> bool {
        for (size_t i = 0; i + 1 < text.size(); i++) {
          const uint8_t b0 = text[i];
          const uint8_t b1 = text[i + 1];
          if (b0 == 0xD7 && b1 >= 0x90 && b1 <= 0xAA) {
            return true;
          }
        }
        return false;
      };
      auto reverse_utf8 = [](const std::string &text) -> std::string {
        struct Utf8Slice {
          size_t start;
          size_t len;
        };
        Utf8Slice chars[100];
        size_t char_count = 0;
        for (size_t i = 0; i < text.size();) {
          size_t len = 1;
          const uint8_t c = text[i];
          if ((c & 0xE0) == 0xC0) {
            len = 2;
          } else if ((c & 0xF0) == 0xE0) {
            len = 3;
          } else if ((c & 0xF8) == 0xF0) {
            len = 4;
          }
          if (i + len > text.size()) {
            len = 1;
          }
          if (char_count >= sizeof(chars) / sizeof(chars[0])) {
            break;
          }
          chars[char_count++] = {i, len};
          i += len;
        }

        std::string out;
        out.reserve(text.size());
        for (size_t i = char_count; i > 0; i--) {
          const auto &ch = chars[i - 1];
          out.append(text, ch.start, ch.len);
        }
        return out;
      };
      auto print_text = [&](const std::string &text, bool text_has_hebrew) {
        if (text_has_hebrew) {
          const std::string rtl = reverse_utf8(text);
          it.print(0, 0, id(matrix_font), rtl.c_str());
        } else {
          it.print(0, 0, id(matrix_font), text.c_str());
        }
      };
      auto pixel_glyph = [](char ch, uint8_t rows[7]) -> int {
        for (int i = 0; i < 7; i++) {
          rows[i] = 0;
        }
        if (ch >= 'a' && ch <= 'z') {
          ch = ch - 'a' + 'A';
        }
        switch (ch) {
          case ' ': return 2;
          case '0': rows[0]=0b111; rows[1]=0b101; rows[2]=0b101; rows[3]=0b101; rows[4]=0b101; rows[5]=0b101; rows[6]=0b111; return 3;
          case '1': rows[0]=0b010; rows[1]=0b110; rows[2]=0b010; rows[3]=0b010; rows[4]=0b010; rows[5]=0b010; rows[6]=0b111; return 3;
          case '2': rows[0]=0b111; rows[1]=0b001; rows[2]=0b001; rows[3]=0b111; rows[4]=0b100; rows[5]=0b100; rows[6]=0b111; return 3;
          case '3': rows[0]=0b111; rows[1]=0b001; rows[2]=0b001; rows[3]=0b111; rows[4]=0b001; rows[5]=0b001; rows[6]=0b111; return 3;
          case '4': rows[0]=0b101; rows[1]=0b101; rows[2]=0b101; rows[3]=0b111; rows[4]=0b001; rows[5]=0b001; rows[6]=0b001; return 3;
          case '5': rows[0]=0b111; rows[1]=0b100; rows[2]=0b100; rows[3]=0b111; rows[4]=0b001; rows[5]=0b001; rows[6]=0b111; return 3;
          case '6': rows[0]=0b111; rows[1]=0b100; rows[2]=0b100; rows[3]=0b111; rows[4]=0b101; rows[5]=0b101; rows[6]=0b111; return 3;
          case '7': rows[0]=0b111; rows[1]=0b001; rows[2]=0b001; rows[3]=0b010; rows[4]=0b010; rows[5]=0b010; rows[6]=0b010; return 3;
          case '8': rows[0]=0b111; rows[1]=0b101; rows[2]=0b101; rows[3]=0b111; rows[4]=0b101; rows[5]=0b101; rows[6]=0b111; return 3;
          case '9': rows[0]=0b111; rows[1]=0b101; rows[2]=0b101; rows[3]=0b111; rows[4]=0b001; rows[5]=0b001; rows[6]=0b111; return 3;
          case 'A': rows[0]=0b010; rows[1]=0b101; rows[2]=0b101; rows[3]=0b111; rows[4]=0b101; rows[5]=0b101; rows[6]=0b101; return 3;
          case 'B': rows[0]=0b110; rows[1]=0b101; rows[2]=0b101; rows[3]=0b110; rows[4]=0b101; rows[5]=0b101; rows[6]=0b110; return 3;
          case 'C': rows[0]=0b111; rows[1]=0b100; rows[2]=0b100; rows[3]=0b100; rows[4]=0b100; rows[5]=0b100; rows[6]=0b111; return 3;
          case 'D': rows[0]=0b110; rows[1]=0b101; rows[2]=0b101; rows[3]=0b101; rows[4]=0b101; rows[5]=0b101; rows[6]=0b110; return 3;
          case 'E': rows[0]=0b111; rows[1]=0b100; rows[2]=0b100; rows[3]=0b110; rows[4]=0b100; rows[5]=0b100; rows[6]=0b111; return 3;
          case 'F': rows[0]=0b111; rows[1]=0b100; rows[2]=0b100; rows[3]=0b110; rows[4]=0b100; rows[5]=0b100; rows[6]=0b100; return 3;
          case 'G': rows[0]=0b111; rows[1]=0b100; rows[2]=0b100; rows[3]=0b101; rows[4]=0b101; rows[5]=0b101; rows[6]=0b111; return 3;
          case 'H': rows[0]=0b101; rows[1]=0b101; rows[2]=0b101; rows[3]=0b111; rows[4]=0b101; rows[5]=0b101; rows[6]=0b101; return 3;
          case 'I': rows[0]=0b111; rows[1]=0b010; rows[2]=0b010; rows[3]=0b010; rows[4]=0b010; rows[5]=0b010; rows[6]=0b111; return 3;
          case 'J': rows[0]=0b001; rows[1]=0b001; rows[2]=0b001; rows[3]=0b001; rows[4]=0b101; rows[5]=0b101; rows[6]=0b111; return 3;
          case 'K': rows[0]=0b101; rows[1]=0b101; rows[2]=0b110; rows[3]=0b100; rows[4]=0b110; rows[5]=0b101; rows[6]=0b101; return 3;
          case 'L': rows[0]=0b100; rows[1]=0b100; rows[2]=0b100; rows[3]=0b100; rows[4]=0b100; rows[5]=0b100; rows[6]=0b111; return 3;
          case 'M': rows[0]=0b101; rows[1]=0b111; rows[2]=0b111; rows[3]=0b101; rows[4]=0b101; rows[5]=0b101; rows[6]=0b101; return 3;
          case 'N': rows[0]=0b101; rows[1]=0b111; rows[2]=0b111; rows[3]=0b111; rows[4]=0b101; rows[5]=0b101; rows[6]=0b101; return 3;
          case 'O': rows[0]=0b111; rows[1]=0b101; rows[2]=0b101; rows[3]=0b101; rows[4]=0b101; rows[5]=0b101; rows[6]=0b111; return 3;
          case 'P': rows[0]=0b111; rows[1]=0b101; rows[2]=0b101; rows[3]=0b111; rows[4]=0b100; rows[5]=0b100; rows[6]=0b100; return 3;
          case 'Q': rows[0]=0b111; rows[1]=0b101; rows[2]=0b101; rows[3]=0b101; rows[4]=0b111; rows[5]=0b001; rows[6]=0b001; return 3;
          case 'R': rows[0]=0b111; rows[1]=0b101; rows[2]=0b101; rows[3]=0b111; rows[4]=0b110; rows[5]=0b101; rows[6]=0b101; return 3;
          case 'S': rows[0]=0b111; rows[1]=0b100; rows[2]=0b100; rows[3]=0b111; rows[4]=0b001; rows[5]=0b001; rows[6]=0b111; return 3;
          case 'T': rows[0]=0b111; rows[1]=0b010; rows[2]=0b010; rows[3]=0b010; rows[4]=0b010; rows[5]=0b010; rows[6]=0b010; return 3;
          case 'U': rows[0]=0b101; rows[1]=0b101; rows[2]=0b101; rows[3]=0b101; rows[4]=0b101; rows[5]=0b101; rows[6]=0b111; return 3;
          case 'V': rows[0]=0b101; rows[1]=0b101; rows[2]=0b101; rows[3]=0b101; rows[4]=0b101; rows[5]=0b101; rows[6]=0b010; return 3;
          case 'W': rows[0]=0b101; rows[1]=0b101; rows[2]=0b101; rows[3]=0b101; rows[4]=0b111; rows[5]=0b111; rows[6]=0b101; return 3;
          case 'X': rows[0]=0b101; rows[1]=0b101; rows[2]=0b010; rows[3]=0b010; rows[4]=0b010; rows[5]=0b101; rows[6]=0b101; return 3;
          case 'Y': rows[0]=0b101; rows[1]=0b101; rows[2]=0b101; rows[3]=0b010; rows[4]=0b010; rows[5]=0b010; rows[6]=0b010; return 3;
          case 'Z': rows[0]=0b111; rows[1]=0b001; rows[2]=0b001; rows[3]=0b010; rows[4]=0b100; rows[5]=0b100; rows[6]=0b111; return 3;
          case '-': rows[3]=0b111; return 3;
          case '.': rows[6]=0b010; return 3;
          case ':': rows[2]=0b010; rows[5]=0b010; return 3;
          case '/': rows[0]=0b001; rows[1]=0b001; rows[2]=0b010; rows[3]=0b010; rows[4]=0b010; rows[5]=0b100; rows[6]=0b100; return 3;
          case '%': rows[0]=0b11001; rows[1]=0b11010; rows[2]=0b00100; rows[3]=0b01000; rows[4]=0b01011; rows[5]=0b10011; rows[6]=0b00000; return 5;
          default: return 0;
        }
      };
      auto draw_pixel_text = [&](const std::string &text, bool text_has_hebrew) -> bool {
        if (text.empty() || text_has_hebrew) {
          return false;
        }

        // First measure every glyph. If any character is unsupported, let the
        // ESPHome font renderer handle the whole string instead.
        struct PixelGlyph {
          size_t start;
          size_t len;
          int width;
          char ascii;
        };
        PixelGlyph glyphs[100];
        size_t glyph_count = 0;
        int text_width = 0;
        for (size_t i = 0; i < text.size();) {
          uint8_t rows[7];
          char ascii = 0;
          size_t len = 1;
          int width = 0;

          const uint8_t b0 = text[i];
          if (b0 < 0x80) {
            ascii = (char) b0;
            width = pixel_glyph(ascii, rows);
          } else {
            return false;
          }

          if (width == 0) {
            return false;
          }
          if (glyph_count >= 100) {
            return false;
          }
          glyphs[glyph_count++] = {i, len, width, ascii};
          text_width += width;
          i += len;
        }

        const int gaps = glyph_count > 1 ? glyph_count - 1 : 0;
        auto glyph_at = [&](size_t visual_index) -> PixelGlyph {
          if (text_has_hebrew) {
            return glyphs[glyph_count - 1 - visual_index];
          }
          return glyphs[visual_index];
        };
        auto draw_glyph = [&](int x, const PixelGlyph &glyph) {
          uint8_t rows[7];
          const int width = pixel_glyph(glyph.ascii, rows);
          for (int y = 0; y < 7; y++) {
            for (int col = 0; col < width; col++) {
              const int px = x + col;
              if (px >= 0 && px < 32 && (rows[y] & (1 << (width - 1 - col)))) {
                it.draw_pixel_at(px, y, Color::WHITE);
              }
            }
          }
        };

        if (text_width + gaps <= 32) {
          // Short messages are spread across all 32 columns so the display does
          // not look like it is using only one side of the matrix.
          const int extra = 32 - text_width - gaps;
          int x = 0;
          for (size_t i = 0; i < glyph_count; i++) {
            const PixelGlyph glyph = glyph_at(i);
            draw_glyph(x, glyph);
            if (i + 1 < glyph_count) {
              const int spread = gaps > 0 ? extra / gaps + ((int) i < (extra % gaps) ? 1 : 0) : 0;
              x += glyph.width + 1 + spread;
            }
          }
        } else {
          // Longer messages use the same pixel glyphs but scroll manually. This
          // keeps English/number text visually consistent with short messages.
          const int scroll_span = text_width + gaps + 33;
          int x = get_scroll_x(text, text_width, gaps, false);
          for (size_t i = 0; i < glyph_count; i++) {
            const PixelGlyph glyph = glyph_at(i);
            draw_glyph(x, glyph);
            x += glyph.width + 1;
          }
        }
        return true;
      };

      auto utf8_codepoint = [](const std::string &text, size_t pos, size_t len) -> uint32_t {
        if (len == 1) {
          return (uint8_t) text[pos];
        }
        if (len == 2) {
          return ((text[pos] & 0x1F) << 6) | (text[pos + 1] & 0x3F);
        }
        if (len == 3) {
          return ((text[pos] & 0x0F) << 12) | ((text[pos + 1] & 0x3F) << 6) | (text[pos + 2] & 0x3F);
        }
        if (len == 4) {
          return ((text[pos] & 0x07) << 18) | ((text[pos + 1] & 0x3F) << 12) | ((text[pos + 2] & 0x3F) << 6) | (text[pos + 3] & 0x3F);
        }
        return 0;
      };

      auto hebrew_pixel_columns = [](uint32_t cp, uint8_t columns[8]) -> int {
        for (int i = 0; i < 8; i++) {
          columns[i] = 0;
        }
        auto trim_columns = [&]() -> int {
          int first = 0;
          while (first < 8 && columns[first] == 0) first++;
          int last = 7;
          while (last >= first && columns[last] == 0) last--;
          if (first > last) {
            return 0;
          }
          int out = 0;
          for (int i = first; i <= last; i++) {
            columns[out++] = columns[i];
          }
          for (int i = out; i < 8; i++) {
            columns[i] = 0;
          }
          return out;
        };
        switch (cp) {
          case 0x05D0: columns[0]=0x00; columns[1]=0x00; columns[2]=0x00; columns[3]=0x3a; columns[4]=0x04; columns[5]=0x08; columns[6]=0x18; columns[7]=0x26; return trim_columns(); // alef
          case 0x05D1: columns[0]=0x00; columns[1]=0x00; columns[2]=0x00; columns[3]=0x22; columns[4]=0x22; columns[5]=0x22; columns[6]=0x3e; columns[7]=0x20; return trim_columns(); // bet
          case 0x05D2: columns[0]=0x00; columns[1]=0x00; columns[2]=0x00; columns[3]=0x00; columns[4]=0x00; columns[5]=0x32; columns[6]=0x0a; columns[7]=0x3e; return trim_columns(); // gimel
          case 0x05D3: columns[0]=0x00; columns[1]=0x00; columns[2]=0x00; columns[3]=0x00; columns[4]=0x02; columns[5]=0x02; columns[6]=0x3e; columns[7]=0x02; return trim_columns(); // dalet
          case 0x05D4: columns[0]=0x00; columns[1]=0x00; columns[2]=0x00; columns[3]=0x00; columns[4]=0x3a; columns[5]=0x02; columns[6]=0x02; columns[7]=0x3e; return trim_columns(); // he
          case 0x05D5: columns[0]=0x00; columns[1]=0x00; columns[2]=0x00; columns[3]=0x00; columns[4]=0x00; columns[5]=0x00; columns[6]=0x02; columns[7]=0x3e; return trim_columns(); // vav
          case 0x05D6: columns[0]=0x00; columns[1]=0x00; columns[2]=0x00; columns[3]=0x00; columns[4]=0x02; columns[5]=0x3a; columns[6]=0x06; columns[7]=0x02; return trim_columns(); // zayin
          case 0x05D7: columns[0]=0x00; columns[1]=0x00; columns[2]=0x00; columns[3]=0x00; columns[4]=0x3e; columns[5]=0x02; columns[6]=0x02; columns[7]=0x3e; return trim_columns(); // het
          case 0x05D8: columns[0]=0x00; columns[1]=0x00; columns[2]=0x00; columns[3]=0x00; columns[4]=0x3e; columns[5]=0x20; columns[6]=0x22; columns[7]=0x3e; return trim_columns(); // tet
          case 0x05D9: columns[0]=0x00; columns[1]=0x00; columns[2]=0x00; columns[3]=0x00; columns[4]=0x00; columns[5]=0x00; columns[6]=0x02; columns[7]=0x06; return trim_columns(); // yod
          case 0x05DA: columns[0]=0x00; columns[1]=0x00; columns[2]=0x00; columns[3]=0x00; columns[4]=0x00; columns[5]=0x02; columns[6]=0x02; columns[7]=0x7e; return trim_columns(); // final kaf
          case 0x05DB: columns[0]=0x00; columns[1]=0x00; columns[2]=0x00; columns[3]=0x00; columns[4]=0x00; columns[5]=0x22; columns[6]=0x22; columns[7]=0x3e; return trim_columns(); // kaf
          case 0x05DC: columns[0]=0x00; columns[1]=0x00; columns[2]=0x00; columns[3]=0x00; columns[4]=0x03; columns[5]=0x22; columns[6]=0x12; columns[7]=0x0e; return trim_columns(); // lamed
          case 0x05DD: columns[0]=0x00; columns[1]=0x00; columns[2]=0x00; columns[3]=0x00; columns[4]=0x3e; columns[5]=0x22; columns[6]=0x22; columns[7]=0x3e; return trim_columns(); // final mem
          case 0x05DE: columns[0]=0x00; columns[1]=0x00; columns[2]=0x00; columns[3]=0x00; columns[4]=0x3e; columns[5]=0x04; columns[6]=0x22; columns[7]=0x3e; return trim_columns(); // mem
          case 0x05DF: columns[0]=0x00; columns[1]=0x00; columns[2]=0x00; columns[3]=0x00; columns[4]=0x00; columns[5]=0x00; columns[6]=0x02; columns[7]=0x7e; return trim_columns(); // final nun
          case 0x05E0: columns[0]=0x00; columns[1]=0x00; columns[2]=0x00; columns[3]=0x00; columns[4]=0x00; columns[5]=0x20; columns[6]=0x22; columns[7]=0x3e; return trim_columns(); // nun
          case 0x05E1: columns[0]=0x00; columns[1]=0x00; columns[2]=0x00; columns[3]=0x00; columns[4]=0x1e; columns[5]=0x22; columns[6]=0x22; columns[7]=0x1e; return trim_columns(); // samekh
          case 0x05E2: columns[0]=0x00; columns[1]=0x00; columns[2]=0x00; columns[3]=0x00; columns[4]=0x4e; columns[5]=0x50; columns[6]=0x22; columns[7]=0x1e; return trim_columns(); // ayin
          case 0x05E3: columns[0]=0x00; columns[1]=0x00; columns[2]=0x00; columns[3]=0x00; columns[4]=0x02; columns[5]=0x06; columns[6]=0x02; columns[7]=0x7e; return trim_columns(); // final pe
          case 0x05E4: columns[0]=0x00; columns[1]=0x00; columns[2]=0x00; columns[3]=0x00; columns[4]=0x00; columns[5]=0x22; columns[6]=0x22; columns[7]=0x3e; return trim_columns(); // pe
          case 0x05E5: columns[0]=0x00; columns[1]=0x00; columns[2]=0x00; columns[3]=0x00; columns[4]=0x06; columns[5]=0x18; columns[6]=0x2a; columns[7]=0x46; return trim_columns(); // final tsadi
          case 0x05E6: columns[0]=0x00; columns[1]=0x00; columns[2]=0x00; columns[3]=0x00; columns[4]=0x22; columns[5]=0x24; columns[6]=0x28; columns[7]=0x36; return trim_columns(); // tsadi
          case 0x05E7: columns[0]=0x00; columns[1]=0x00; columns[2]=0x00; columns[3]=0x00; columns[4]=0x72; columns[5]=0x02; columns[6]=0x22; columns[7]=0x1e; return trim_columns(); // qof
          case 0x05E8: columns[0]=0x00; columns[1]=0x00; columns[2]=0x00; columns[3]=0x00; columns[4]=0x02; columns[5]=0x02; columns[6]=0x02; columns[7]=0x3e; return trim_columns(); // resh
          case 0x05E9: columns[0]=0x00; columns[1]=0x00; columns[2]=0x00; columns[3]=0x3e; columns[4]=0x28; columns[5]=0x2e; columns[6]=0x20; columns[7]=0x3e; return trim_columns(); // shin
          case 0x05EA: columns[0]=0x00; columns[1]=0x00; columns[2]=0x00; columns[3]=0x00; columns[4]=0x20; columns[5]=0x3e; columns[6]=0x02; columns[7]=0x3e; return trim_columns(); // tav
          default: return 0;
        }
      };

      // Prefer the custom full-width pixel renderer for supported text.
      // Fall back to the ESPHome font renderer only for unsupported characters.
      auto draw_hebrew_text = [&](const std::string &text) -> bool {
        struct Utf8Slice {
          size_t start;
          size_t len;
          int width;
          uint32_t codepoint;
        };
        Utf8Slice chars[100];
        size_t char_count = 0;
        int text_width = 0;

        for (size_t i = 0; i < text.size();) {
          size_t len = 1;
          const uint8_t c = text[i];
          if ((c & 0xE0) == 0xC0) len = 2;
          else if ((c & 0xF0) == 0xE0) len = 3;
          else if ((c & 0xF8) == 0xF0) len = 4;
          if (i + len > text.size() || char_count >= sizeof(chars) / sizeof(chars[0])) return false;

          const uint32_t codepoint = utf8_codepoint(text, i, len);
          uint8_t glyph_data[8] = {0};
          int glyph_width = 0;
          if (codepoint == ' ') glyph_width = 2;
          else if (codepoint < 0x80) glyph_width = pixel_glyph((char)codepoint, glyph_data);
          else glyph_width = hebrew_pixel_columns(codepoint, glyph_data);
          
          if (glyph_width == 0) return false;
          chars[char_count++] = {i, len, glyph_width, codepoint};
          text_width += glyph_width;
          i += len;
        }
        if (char_count == 0) return false;

        // Bidi fix: reverse contiguous blocks of LTR characters so they display left-to-right
        size_t ltr_start = 0;
        bool in_ltr = false;
        for (size_t i = 0; i <= char_count; i++) {
          bool is_ltr_char = i < char_count && (chars[i].codepoint < 0x05D0);
          if (is_ltr_char && !in_ltr) {
            ltr_start = i;
            in_ltr = true;
          } else if (!is_ltr_char && in_ltr) {
            size_t ltr_end = i;
            size_t actual_start = ltr_start;
            while (actual_start < ltr_end && chars[actual_start].codepoint == ' ') actual_start++;
            while (ltr_end > actual_start && chars[ltr_end - 1].codepoint == ' ') ltr_end--;
            for (size_t a = actual_start, b = ltr_end - 1; a < b; a++, b--) std::swap(chars[a], chars[b]);
            in_ltr = false;
          }
        }

        uint8_t columns[768];
        int column_count = 0;
        auto append_blank_columns = [&](int count) -> bool {
          for (int i = 0; i < count; i++) {
            if (column_count >= (int) (sizeof(columns) / sizeof(columns[0]))) {
              return false;
            }
            columns[column_count++] = 0;
          }
          return true;
        };
        auto append_rows_as_columns = [&](const uint8_t rows[7], int width) -> bool {
          for (int col = 0; col < width; col++) {
            if (column_count >= (int) (sizeof(columns) / sizeof(columns[0]))) {
              return false;
            }
            uint8_t column = 0;
            for (int y = 0; y < 7; y++) {
              if (rows[y] & (1 << (width - 1 - col))) {
                column |= (1 << y);
              }
            }
            columns[column_count++] = column;
          }
          return true;
        };
        auto append_raw_columns = [&](const uint8_t raw_columns[8], int width) -> bool {
          for (int i = 0; i < width; i++) {
            if (column_count >= (int) (sizeof(columns) / sizeof(columns[0]))) {
              return false;
            }
            columns[column_count++] = raw_columns[i];
          }
          return true;
        };

        for (size_t visual_index = 0; visual_index < char_count; visual_index++) {
          const auto &ch = chars[char_count - 1 - visual_index];
          uint8_t glyph_data[8] = {0};
          int width = 0;
          bool raw_columns = false;
          if (ch.codepoint == ' ') width = 2;
          else if (ch.codepoint < 0x80) width = pixel_glyph((char)ch.codepoint, glyph_data);
          else {
            width = hebrew_pixel_columns(ch.codepoint, glyph_data);
            raw_columns = true;
          }

          if (ch.codepoint == ' ') {
            if (!append_blank_columns(width)) {
              return false;
            }
          } else if (raw_columns) {
            if (!append_raw_columns(glyph_data, width)) {
              return false;
            }
          } else if (!append_rows_as_columns(glyph_data, width)) {
            return false;
          }
          if (visual_index + 1 < char_count && !append_blank_columns(1)) {
            return false;
          }
        }

        const bool scroll = column_count > 32;
        const int offset = scroll ? -get_scroll_x(text, column_count, 0, true) : 0;
        const int start_x = scroll ? 0 : 32 - column_count;
        for (int x = 0; x < 32; x++) {
          const int src = scroll ? offset + x : x - start_x;
          if (src < 0 || src >= column_count) {
            continue;
          }
          for (int y = 0; y < 7; y++) {
            if (columns[src] & (1 << y)) {
              it.draw_pixel_at(x, y, Color::WHITE);
            }
          }
        }
        return true;
      };
      auto show_text = [&](const std::string &text) {
        const bool text_has_hebrew = has_hebrew(text);
        if (text_has_hebrew && draw_hebrew_text(text)) {
          return;
        }
        if (!draw_pixel_text(text, text_has_hebrew)) {
          print_text(text, text_has_hebrew);
        }
      };

      auto draw_small_glyph = [&](int x, char ch) {
        uint8_t rows[7];
        const int width = pixel_glyph(ch, rows);
        if (width == 0) {
          return;
        }
        for (int y = 0; y < 7; y++) {
          for (int col = 0; col < width; col++) {
            if (rows[y] & (1 << (width - 1 - col))) {
              it.draw_pixel_at(x + col, y, Color::WHITE);
            }
          }
        }
      };

      auto draw_degree = [&](int x) {
        it.draw_pixel_at(x, 0, Color::WHITE);
        it.draw_pixel_at(x + 1, 0, Color::WHITE);
        it.draw_pixel_at(x, 1, Color::WHITE);
        it.draw_pixel_at(x + 1, 1, Color::WHITE);
      };

      // Fixed-width sensor screen. Compact layout.
      auto draw_sensor_screen = [&]() {
        int temp = isnan(id(aht_temperature).state) ? 0 : (int) roundf(id(aht_temperature).state);
        int humidity = isnan(id(aht_humidity).state) ? 0 : (int) roundf(id(aht_humidity).state);
        temp = temp < 0 ? 0 : (temp > 99 ? 99 : temp);
        humidity = humidity < 0 ? 0 : (humidity > 99 ? 99 : humidity);

        // Temp left-aligned
        draw_small_glyph(0, '0' + (temp / 10));
        draw_small_glyph(4, '0' + (temp % 10));
        draw_degree(8);
        draw_small_glyph(11, 'C');

        // Humidity right-aligned with standard % sign
        draw_small_glyph(18, '0' + (humidity / 10));
        draw_small_glyph(22, '0' + (humidity % 10));
        draw_small_glyph(27, '%');
      };
      auto draw_digit = [&](int x, int value) {
        static const uint8_t digits[10][7] = {
          {0b1111, 0b1001, 0b1001, 0b1001, 0b1001, 0b1001, 0b1111},
          {0b0010, 0b0110, 0b0010, 0b0010, 0b0010, 0b0010, 0b0111},
          {0b1110, 0b0001, 0b0001, 0b1110, 0b1000, 0b1000, 0b1111},
          {0b1110, 0b0001, 0b0001, 0b0110, 0b0001, 0b0001, 0b1110},
          {0b1001, 0b1001, 0b1001, 0b1111, 0b0001, 0b0001, 0b0001},
          {0b1111, 0b1000, 0b1000, 0b1110, 0b0001, 0b0001, 0b1110},
          {0b0111, 0b1000, 0b1000, 0b1110, 0b1001, 0b1001, 0b0110},
          {0b1111, 0b0001, 0b0010, 0b0010, 0b0100, 0b0100, 0b0100},
          {0b0110, 0b1001, 0b1001, 0b0110, 0b1001, 0b1001, 0b0110},
          {0b0110, 0b1001, 0b1001, 0b0111, 0b0001, 0b0001, 0b1110},
        };

        if (value < 0 || value > 9) {
          return;
        }
        for (int y = 0; y < 7; y++) {
          for (int col = 0; col < 4; col++) {
            if (digits[value][y] & (1 << (3 - col))) {
              it.draw_pixel_at(x + col, y, Color::WHITE);
            }
          }
        }
      };
      auto draw_colon = [&](int x) {
        it.draw_pixel_at(x, 2, Color::WHITE);
        it.draw_pixel_at(x, 5, Color::WHITE);
      };
      auto draw_large_digit = [&](int x, int value) {
        static const uint8_t digits[10][7] = {
          {0b01110, 0b10001, 0b10011, 0b10101, 0b11001, 0b10001, 0b01110},
          {0b00100, 0b01100, 0b00100, 0b00100, 0b00100, 0b00100, 0b01110},
          {0b01110, 0b10001, 0b00001, 0b00010, 0b00100, 0b01000, 0b11111},
          {0b11110, 0b00001, 0b00001, 0b01110, 0b00001, 0b00001, 0b11110},
          {0b00010, 0b00110, 0b01010, 0b10010, 0b11111, 0b00010, 0b00010},
          {0b11111, 0b10000, 0b10000, 0b11110, 0b00001, 0b00001, 0b11110},
          {0b00110, 0b01000, 0b10000, 0b11110, 0b10001, 0b10001, 0b01110},
          {0b11111, 0b00001, 0b00010, 0b00100, 0b01000, 0b01000, 0b01000},
          {0b01110, 0b10001, 0b10001, 0b01110, 0b10001, 0b10001, 0b01110},
          {0b01110, 0b10001, 0b10001, 0b01111, 0b00001, 0b00010, 0b11100},
        };

        if (value < 0 || value > 9) {
          return;
        }
        for (int y = 0; y < 7; y++) {
          for (int col = 0; col < 5; col++) {
            if (digits[value][y] & (1 << (4 - col))) {
              it.draw_pixel_at(x + col, y, Color::WHITE);
            }
          }
        }
      };
      auto draw_large_colon = [&](int x, bool visible) {
        if (!visible) {
          return;
        }
        it.draw_pixel_at(x, 2, Color::WHITE);
        it.draw_pixel_at(x + 1, 2, Color::WHITE);
        it.draw_pixel_at(x, 5, Color::WHITE);
        it.draw_pixel_at(x + 1, 5, Color::WHITE);
      };
      auto draw_clock_hh_mm_ss = [&](int hour, int minute, int second) {
        draw_digit(0, hour / 10);
        draw_digit(5, hour % 10);
        draw_colon(10);
        draw_digit(12, minute / 10);
        draw_digit(17, minute % 10);
        draw_colon(22);
        draw_digit(23, second / 10);
        draw_digit(28, second % 10);
      };
      auto draw_clock_hh_mm = [&](int hour, int minute, int second) {
        const bool colon_visible = (second % 2) == 0;
        draw_large_digit(1, hour / 10);
        draw_large_digit(7, hour % 10);
        draw_large_colon(14, colon_visible);
        draw_large_digit(18, minute / 10);
        draw_large_digit(24, minute % 10);
      };
      auto draw_clock = [&](int hour, int minute, int second) {
        if (id(time_format).current_option() == "HH:MM") {
          draw_clock_hh_mm(hour, minute, second);
        } else {
          draw_clock_hh_mm_ss(hour, minute, second);
        }
      };

      // Display priority: the first active branch wins. This keeps explicit
      // Home Assistant messages above automatic status screens.
      if (active_until(id(text_message_until)) && !id(text_message).empty()) {
        show_text(id(text_message));
        return;
      }

      if (active_until(id(media_message_until)) && !id(media_message).empty()) {
        show_text(id(media_message));
        return;
      }

      if (id(show_system_alerts).state && active_until(id(system_alert_until)) && !id(system_alert_message).empty()) {
        show_text(id(system_alert_message));
        return;
      }

      if (id(show_system_alerts).state && active_until(id(wifi_alert_until))) {
        show_text("NO WIFI");
        return;
      }

      // The date screen only renders after NTP is valid. If time is not ready,
      // it falls through to the normal clock fallback below.
      if (active_until(id(date_message_until))) {
        auto date_now = id(ntp_time).now();
        if (date_now.is_valid()) {
          it.strftime(0, 0, id(matrix_font), "%a %d/%m", date_now);
          return;
        }
      }

      // Sensor values use a fixed, non-scrolling layout. Missing readings show
      // as 00°C 00% instead of hiding the sensor screen.
      if (active_until(id(sensor_message_until))) {
        draw_sensor_screen();
        return;
      }

      // Default display. If time has not synced yet, show startup/network status
      // instead of leaving the matrix on a long "--:--" placeholder.
      auto now = id(ntp_time).now();
      if (now.is_valid()) {
        draw_clock(now.hour, now.minute, now.second);
      } else if (id(show_system_alerts).state) {
        if (!id(wifi_component).is_connected()) {
          show_text("NO WIFI");
        } else if (id(time_sync_retry_count) >= 2) {
          show_text("NO NET");
        } else {
          show_text("SYNC");
        }
      } else {
        show_text("--:--");
      }

speaker:
  # Audio is split into announcement and media pipelines, then mixed back into
  # one physical I2S speaker. Announcements can interrupt/duck media without
  # changing the main playback path.
  - platform: i2s_audio
    id: i2s_speaker
    dac_type: external
    i2s_dout_pin: GPIO25
    channel: right
    sample_rate: 16000
    bits_per_sample: 16bit
    i2s_comm_fmt: stand_msb
    buffer_duration: 500ms
    timeout: 250ms

  - platform: mixer
    id: audio_mixer
    output_speaker: i2s_speaker
    source_speakers:
      - id: announcement_mixer_input
        buffer_duration: 50ms
        timeout: 250ms
      - id: media_mixer_input
        buffer_duration: 50ms
        timeout: 250ms

  - platform: resampler
    id: announcement_speaker
    output_speaker: announcement_mixer_input
    buffer_duration: 50ms
    filters: 16
    taps: 16

  - platform: resampler
    id: media_speaker
    output_speaker: media_mixer_input
    buffer_duration: 50ms
    filters: 16
    taps: 16

media_player:
  - platform: speaker
    name: "Speaker"
    id: clock_speaker
    device_id: audio_device
    files:
      # Tiny local WAV used for volume feedback. It plays as an announcement so
      # the user hears the current volume immediately after changing it.
      - id: volume_beep
        file: media/volume-beep.wav
    on_play:
      - lambda: |-
          const float seconds = isnan(id(media_message_seconds).state) ? 10.0f : id(media_message_seconds).state;
          id(audio_playback_active) = true;
          id(media_stream_playing) = true;
          id(media_playback_started_ms) = millis();
          id(media_playback_failed) = false;
          ESP_LOGI("audio", "Media playback started: media_pipeline=WAV 16000Hz mono, i2s=right stand_msb 16bit, buffer=500ms, timeout=250ms");
          id(media_message) = "MUSIC";
          id(media_message_until) = millis() + (uint32_t) (seconds * 1000.0f);
      - component.update: matrix_display
    on_announcement:
      - lambda: |-
          const float seconds = isnan(id(media_message_seconds).state) ? 10.0f : id(media_message_seconds).state;
          id(audio_playback_active) = true;
          id(media_stream_playing) = false;
          id(media_playback_failed) = false;
          ESP_LOGI("audio", "Announcement playback started: announcement_pipeline=WAV 16000Hz mono, i2s=right stand_msb 16bit, buffer=500ms, timeout=250ms");
          id(media_message) = "SPEAKER";
          id(media_message_until) = millis() + (uint32_t) (seconds * 1000.0f);
      - component.update: matrix_display
    on_pause:
      - lambda: |-
          id(audio_playback_active) = false;
          id(media_stream_playing) = false;
          id(media_playback_failed) = false;
          ESP_LOGI("audio", "Media playback paused");
          id(media_message).clear();
          id(media_message_until) = 0;
      - component.update: matrix_display
    on_idle:
      - lambda: |-
          const uint32_t elapsed_ms = millis() - id(media_playback_started_ms);
          id(media_playback_failed) = id(media_stream_playing) && elapsed_ms < 8000;
          id(audio_playback_active) = false;
          id(media_stream_playing) = false;
          ESP_LOGI("audio", "Media player idle after %u ms (failed_fast=%s)",
                   (unsigned) elapsed_ms, id(media_playback_failed) ? "true" : "false");
          id(media_message).clear();
          if (id(media_playback_failed)) {
            id(media_message) = "AUDIO ERR";
            id(media_message_until) = millis() + 5000;
          } else {
            id(media_message_until) = 0;
          }
      - if:
          condition:
            lambda: |-
              return id(media_playback_failed);
          then:
            - homeassistant.event:
                event: esphome.media_playback_failed
                data:
                  device: esp32-smart-clock
                  reason: playback_stopped_early_or_unsupported_stream
                  hint: use_16khz_mono_or_a_smaller_stream
            - lambda: |-
                id(media_playback_failed) = false;
      - component.update: matrix_display
    on_turn_off:
      - lambda: |-
          id(audio_playback_active) = false;
          id(media_stream_playing) = false;
          id(media_playback_failed) = false;
          ESP_LOGI("audio", "Media player turned off");
          id(media_message).clear();
          id(media_message_until) = 0;
      - component.update: matrix_display
    on_volume:
      - lambda: |-
          ESP_LOGI("settings", "Speaker volume changed to %.0f%% (audio_playback_active=%s, state=%d)", x * 100.0f, id(audio_playback_active) ? "true" : "false", (int)id(clock_speaker).state);
          if (millis() < 15000) {
            return;
          }
          if (id(audio_playback_active) || id(clock_speaker).state == media_player::MEDIA_PLAYER_STATE_PLAYING || id(clock_speaker).state == media_player::MEDIA_PLAYER_STATE_ANNOUNCING) {
            ESP_LOGI("audio", "Volume feedback beep skipped because audio is already playing");
            id(volume_beep_pending) = false;
            return;
          }
          // Defer actual playback to the 250ms interval above. Calling
          // play_on_device_media_file directly here creates a codegen cycle.
          id(volume_beep_pending) = true;
    buffer_size: 12000
    announcement_pipeline:
      speaker: announcement_speaker
      format: WAV
      sample_rate: 16000
      num_channels: 1
    media_pipeline:
      speaker: media_speaker
      format: WAV
      sample_rate: 16000
      num_channels: 1
