[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; Exact hardware config for ESP32 HW-394 / WR-32 style board.
board_build.mcu = esp32
board_build.f_cpu = 240000000L
board_build.flash_size = 4MB
board_build.flash_mode = dio
board_upload.flash_size = 4MB

build_src_filter = +<main.cpp> -<bt_a2dp_sink.cpp>
build_flags =
  ; MD_MAX72XX emits an informational #warning once per source file to say
  ; which SPI backend it selected. Keep real compiler warnings visible.
  -Wno-cpp
  ; The hardware-test tone still uses the legacy ESP-IDF I2S API because it is
  ; small, stable on ESP32, and separate from the ESPHome firmware.
  -DCONFIG_I2S_SUPPRESS_DEPRECATE_WARN=1
  -DCONFIG_ADC_SUPPRESS_DEPRECATE_WARN=1

lib_deps =
  adafruit/Adafruit AHTX0
  adafruit/Adafruit BMP280 Library
  adafruit/Adafruit GFX Library
  majicdesigns/MD_MAX72XX

[env:bluetooth_speaker]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; Exact hardware config for ESP32 HW-394 / WR-32 style board.
board_build.mcu = esp32
board_build.f_cpu = 240000000L
board_build.flash_size = 4MB
board_build.flash_mode = dio
board_upload.flash_size = 4MB

build_src_filter = +<bt_a2dp_sink.cpp> -<main.cpp>
build_flags =
  ; We use the Arduino ESP_I2S output path directly, not the optional
  ; AudioTools integration.
  -DA2DP_I2S_AUDIOTOOLS=0
  -DCONFIG_I2S_SUPPRESS_DEPRECATE_WARN=1
  -DCONFIG_ADC_SUPPRESS_DEPRECATE_WARN=1

lib_deps =
  https://github.com/pschatzmann/ESP32-A2DP
