name: ESPHome Upgrade PR

on:
  schedule:
    - cron: "42 4 * * 1"
  workflow_dispatch:
    inputs:
      target_version:
        description: "ESPHome version to verify. Leave empty for latest stable from PyPI."
        required: false
        type: string
      force:
        description: "Verify and refresh the PR even when ESPHOME_VERSION already matches."
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  esphome-upgrade:
    name: Verify ESPHome upgrade
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Resolve ESPHome version
        id: version
        env:
          REQUESTED_VERSION: ${{ inputs.target_version }}
          FORCE_VERIFY: ${{ inputs.force }}
        run: |
          set -euo pipefail

          current="$(tr -d '[:space:]' < ESPHOME_VERSION)"
          if [ -n "${REQUESTED_VERSION}" ]; then
            target="${REQUESTED_VERSION}"
          else
            target="$(python - <<'PY'
          import json
          import re
          import urllib.request

          with urllib.request.urlopen("https://pypi.org/pypi/esphome/json", timeout=30) as response:
              data = json.load(response)

          versions = [
              version
              for version in data["releases"]
              if re.fullmatch(r"\d{4}\.\d+\.\d+", version)
          ]
          versions.sort(key=lambda value: tuple(int(part) for part in value.split(".")))
          print(versions[-1])
          PY
            )"
          fi

          upgrade_needed=false
          if [ "${target}" != "${current}" ] || [ "${FORCE_VERIFY}" = "true" ]; then
            upgrade_needed=true
          fi

          {
            echo "current=${current}"
            echo "target=${target}"
            echo "upgrade_needed=${upgrade_needed}"
          } >> "${GITHUB_OUTPUT}"

          {
            echo "## ESPHome upgrade check"
            echo
            echo "- Current tracked version: \`${current}\`"
            echo "- Target version: \`${target}\`"
            echo "- Upgrade needed: \`${upgrade_needed}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Stop when already current
        if: steps.version.outputs.upgrade_needed != 'true'
        run: echo "ESPHOME_VERSION is already current; no migration PR needed."

      - name: Install target build tools
        if: steps.version.outputs.upgrade_needed == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade platformio "esphome==${{ steps.version.outputs.target }}"

      - name: Prepare ESPHome CI secrets
        if: steps.version.outputs.upgrade_needed == 'true'
        run: cp secrets.example.yaml secrets.yaml

      - name: Use CI-local ESPHome build path
        if: steps.version.outputs.upgrade_needed == 'true'
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("esphome-smart-clock.yaml")
          text = path.read_text(encoding="utf-8")
          text = text.replace(
              "build_path: C:/Users/nirbe/.esphome/build/${device_name}",
              "build_path: .esphome/build/${device_name}",
          )
          path.write_text(text, encoding="utf-8")
          PY

      - name: Validate ESPHome config
        if: steps.version.outputs.upgrade_needed == 'true'
        run: esphome config esphome-smart-clock.yaml

      - name: Compile ESPHome smart clock firmware
        if: steps.version.outputs.upgrade_needed == 'true'
        run: esphome compile esphome-smart-clock.yaml

      - name: Build PlatformIO hardware test firmware
        if: steps.version.outputs.upgrade_needed == 'true'
        run: pio run -e esp32dev

      - name: Build PlatformIO Bluetooth speaker firmware
        if: steps.version.outputs.upgrade_needed == 'true'
        run: pio run -e bluetooth_speaker

      - name: Restore repository ESPHome build path
        if: steps.version.outputs.upgrade_needed == 'true'
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("esphome-smart-clock.yaml")
          text = path.read_text(encoding="utf-8")
          text = text.replace(
              "build_path: .esphome/build/${device_name}",
              "build_path: C:/Users/nirbe/.esphome/build/${device_name}",
          )
          path.write_text(text, encoding="utf-8")
          PY

      - name: Record verified ESPHome upgrade
        if: steps.version.outputs.upgrade_needed == 'true'
        run: |
          mkdir -p .github/reports
          printf '%s\n' "${{ steps.version.outputs.target }}" > ESPHOME_VERSION
          {
            echo "# ESPHome Upgrade Verification"
            echo
            echo "- Verified at: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            echo "- Previous tracked ESPHome: ${{ steps.version.outputs.current }}"
            echo "- Verified ESPHome: ${{ steps.version.outputs.target }}"
            echo "- Commit tested: ${GITHUB_SHA}"
            echo
            echo "## Tool Versions"
            echo
            echo '```text'
            python --version
            python -m pip --version
            platformio --version
            esphome version
            echo '```'
            echo
            echo "## Result"
            echo
            echo "The ESPHome config validation, ESPHome firmware compile, PlatformIO hardware test build, and PlatformIO Bluetooth speaker build all passed with the target ESPHome version."
          } > .github/reports/esphome-upgrade.md

      - name: Open migration pull request
        if: steps.version.outputs.upgrade_needed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: automation/esphome-${{ steps.version.outputs.target }}
          delete-branch: true
          commit-message: "chore: verify ESPHome ${{ steps.version.outputs.target }}"
          title: "chore: verify ESPHome ${{ steps.version.outputs.target }}"
          body: |
            ## ESPHome upgrade

            This PR was opened automatically after verifying the project with ESPHome `${{ steps.version.outputs.target }}`.

            Checks completed:
            - `esphome config esphome-smart-clock.yaml`
            - `esphome compile esphome-smart-clock.yaml`
            - `pio run -e esp32dev`
            - `pio run -e bluetooth_speaker`

            Review `.github/reports/esphome-upgrade.md` before merging and releasing.
          add-paths: |
            ESPHOME_VERSION
            .github/reports/esphome-upgrade.md
