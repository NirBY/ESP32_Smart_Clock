name: Build and Release Firmware

on:
  push:
    tags:
      - "v*"
      - "V*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional tag to create after a successful build, for example v0.1.1-beta.1"
        required: false
        type: string
      prerelease:
        description: "Mark a manually created release as a pre-release"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-release:
    name: Build firmware
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Resolve release version
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag || '' }}
          REF_NAME: ${{ github.ref_name }}
          REF: ${{ github.ref }}
        run: |
          release_tag=""
          if [ "${EVENT_NAME}" = "workflow_dispatch" ] && [ -n "${INPUT_RELEASE_TAG}" ]; then
            release_tag="${INPUT_RELEASE_TAG}"
          elif [[ "${REF}" == refs/tags/* ]]; then
            release_tag="${REF_NAME}"
          fi

          firmware_version="${release_tag}"
          firmware_version="${firmware_version#v}"
          firmware_version="${firmware_version#V}"

          if [ -z "${firmware_version}" ]; then
            firmware_version="$(grep -E '^[[:space:]]*firmware_version:' esphome-smart-clock.yaml | head -n 1 | sed -E 's/.*"([^"]+)".*/\1/')"
          fi

          echo "RELEASE_TAG=${release_tag}" >> "${GITHUB_ENV}"
          echo "FIRMWARE_VERSION=${firmware_version}" >> "${GITHUB_ENV}"
          echo "Resolved release tag: ${release_tag:-none}"
          echo "Resolved firmware version: ${firmware_version}"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install platformio esphome

      - name: Prepare ESPHome CI secrets
        run: cp secrets.example.yaml secrets.yaml

      - name: Use CI-local ESPHome build path
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          path = Path("esphome-smart-clock.yaml")
          text = path.read_text(encoding="utf-8")
          text = text.replace(
              "build_path: C:/Users/nirbe/.esphome/build/${device_name}",
              "build_path: build/${device_name}",
          )
          firmware_version = os.environ["FIRMWARE_VERSION"]
          text = re.sub(
              r'(^\s*firmware_version:\s*)".*?"',
              rf'\g<1>"{firmware_version}"',
              text,
              count=1,
              flags=re.MULTILINE,
          )
          path.write_text(text, encoding="utf-8")
          PY

      - name: Validate ESPHome config
        run: esphome config esphome-smart-clock.yaml

      - name: Compile ESPHome smart clock firmware
        run: esphome compile esphome-smart-clock.yaml

      - name: Build PlatformIO hardware test firmware
        run: pio run -e esp32dev

      - name: Build PlatformIO Bluetooth speaker firmware
        run: pio run -e bluetooth_speaker

      - name: Collect firmware artifacts
        run: |
          mkdir -p release
          esphome_build_dir=""
          for candidate in \
            "build/esp32-smart-clock/.pioenvs/esp32-smart-clock" \
            ".esphome/build/esp32-smart-clock/.pioenvs/esp32-smart-clock"
          do
            if [ -f "${candidate}/firmware.factory.bin" ] && [ -f "${candidate}/firmware.ota.bin" ]; then
              esphome_build_dir="${candidate}"
              break
            fi
          done

          if [ -z "${esphome_build_dir}" ]; then
            echo "ESPHome firmware artifacts were not found."
            echo "Known build directories:"
            find build .esphome -maxdepth 5 -type f -name 'firmware*.bin' -print 2>/dev/null || true
            exit 1
          fi

          cp "${esphome_build_dir}/firmware.factory.bin" release/esphome-smart-clock.factory.bin
          cp "${esphome_build_dir}/firmware.ota.bin" release/esphome-smart-clock.ota.bin
          cp .pio/build/esp32dev/firmware.bin release/platformio-hardware-test.bin
          cp .pio/build/bluetooth_speaker/firmware.bin release/bluetooth-speaker.bin

          ota_md5="$(md5sum release/esphome-smart-clock.ota.bin | awk '{print $1}')"
          printf '%s\n' "${ota_md5}" > release/esphome-smart-clock.ota.md5

          ota_url="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/firmware-latest/esphome-smart-clock.ota.bin"
          if [ -n "${RELEASE_TAG}" ]; then
            release_url="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${RELEASE_TAG}"
          else
            release_url="https://github.com/${GITHUB_REPOSITORY}/releases/latest"
          fi
          export ota_url release_url

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          md5 = Path("release/esphome-smart-clock.ota.md5").read_text(encoding="utf-8").strip()
          manifest = {
              "name": "ESP32 Smart Clock",
              "version": os.environ["FIRMWARE_VERSION"],
              "builds": [
                  {
                      "chipFamily": "ESP32",
                      "ota": {
                          "md5": md5,
                          "path": os.environ["ota_url"],
                          "release_url": os.environ["release_url"],
                          "summary": f"ESP32 Smart Clock {os.environ['FIRMWARE_VERSION']}",
                      },
                  }
              ],
          }
          Path("release/firmware-manifest.json").write_text(
              json.dumps(manifest, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Create manual release tag after successful build
        if: github.event_name == 'workflow_dispatch' && inputs.release_tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${{ github.repository }}/git/refs" \
            -f ref="refs/tags/${RELEASE_TAG}" \
            -f sha="${{ github.sha }}"

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: release/*

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
          files: release/*

      - name: Publish Home Assistant firmware update channel
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
        env:
          UPDATE_BRANCH: firmware-latest
        run: |
          set -euo pipefail

          mkdir -p update-channel
          cp release/esphome-smart-clock.ota.bin update-channel/esphome-smart-clock.ota.bin
          cp release/esphome-smart-clock.ota.md5 update-channel/esphome-smart-clock.ota.md5
          cp release/firmware-manifest.json update-channel/firmware-manifest.json
          printf '%s\n' "${FIRMWARE_VERSION}" > update-channel/VERSION

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C update-channel init
          git -C update-channel checkout -B "${UPDATE_BRANCH}"
          git -C update-channel add .
          git -C update-channel commit -m "Publish firmware ${FIRMWARE_VERSION}"
          git -C update-channel push --force "https://x-access-token:${{ github.token }}@github.com/${GITHUB_REPOSITORY}.git" "${UPDATE_BRANCH}"
