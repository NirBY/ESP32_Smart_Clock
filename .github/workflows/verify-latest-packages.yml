name: Verify latest packages

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    name: Build with latest packages
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install latest build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade platformio esphome

      - name: Prepare ESPHome CI secrets
        run: cp secrets.example.yaml secrets.yaml

      - name: Use CI-local ESPHome build path
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("esphome-smart-clock.yaml")
          text = path.read_text(encoding="utf-8")
          text = text.replace(
              "build_path: C:/Users/nirbe/.esphome/build/${device_name}",
              "build_path: build/${device_name}",
          )
          path.write_text(text, encoding="utf-8")
          PY

      - name: Validate ESPHome config
        run: esphome config esphome-smart-clock.yaml

      - name: Compile ESPHome smart clock firmware
        run: esphome compile esphome-smart-clock.yaml

      - name: Build PlatformIO hardware test firmware
        run: pio run -e esp32dev

      - name: Build PlatformIO Bluetooth speaker firmware
        run: pio run -e bluetooth_speaker

      - name: Write verification report
        run: |
          mkdir -p .github/reports
          {
            echo "# Latest Package Verification"
            echo
            echo "- Verified at: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            echo "- Commit: ${GITHUB_SHA}"
            echo
            echo "## Tool Versions"
            echo
            echo '```text'
            python --version
            python -m pip --version
            platformio --version
            esphome version
            echo '```'
            echo
            echo "## Result"
            echo
            echo "ESPHome validation, ESPHome compile, PlatformIO hardware test build, and PlatformIO Bluetooth speaker build all passed with the latest available Python packages."
          } > .github/reports/latest-package-verify.md

      - name: Update manual review branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B automation/latest-package-verify
          git add .github/reports/latest-package-verify.md
          if git diff --cached --quiet; then
            echo "No verification report changes to commit."
          else
            git commit -m "chore: verify latest package builds"
            git push --force-with-lease origin automation/latest-package-verify
          fi

      - name: Write review instructions
        run: |
          {
            echo "## Manual review branch"
            echo
            echo "The latest package verification report was pushed to:"
            echo
            echo "- \`automation/latest-package-verify\`"
            echo
            echo "GitHub Actions is not permitted by this repository to create pull requests automatically."
            echo "Open a pull request manually from the branch above if a review PR is needed."
          } >> "$GITHUB_STEP_SUMMARY"
