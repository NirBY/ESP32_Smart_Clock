name: Daily Package Update Verify

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify-latest-packages:
    name: Verify latest packages
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install latest build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade platformio esphome

      - name: Prepare ESPHome CI secrets
        run: cp secrets.example.yaml secrets.yaml

      - name: Use CI-local ESPHome build path
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("esphome-smart-clock.yaml")
          text = path.read_text(encoding="utf-8")
          text = text.replace(
              "build_path: C:/Users/nirbe/.esphome/build/${device_name}",
              "build_path: build/${device_name}",
          )
          path.write_text(text, encoding="utf-8")
          PY

      - name: Validate ESPHome config
        run: esphome config esphome-smart-clock.yaml

      - name: Compile ESPHome smart clock firmware
        run: esphome compile esphome-smart-clock.yaml

      - name: Build PlatformIO hardware test firmware
        run: pio run -e esp32dev

      - name: Build PlatformIO Bluetooth speaker firmware
        run: pio run -e bluetooth_speaker

      - name: Write package update verification report
        run: |
          mkdir -p .github/reports
          {
            echo "# Daily Package Update Verification"
            echo
            echo "- Verified at: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            echo "- Commit: ${GITHUB_SHA}"
            echo "- ESPHome: $(esphome version)"
            echo "- PlatformIO: $(pio --version)"
            echo
            echo "Builds completed successfully with the latest packages available to pip and PlatformIO:"
            echo
            echo "- ESPHome smart clock firmware"
            echo "- PlatformIO hardware test firmware"
            echo "- PlatformIO Bluetooth speaker firmware"
            echo
            echo "Review the automation branch before creating a new release."
          } > .github/reports/daily-package-update.md

      - name: Update manual review branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B automation/daily-package-update
          git add .github/reports/daily-package-update.md
          if git diff --cached --quiet; then
            echo "No verification report changes to commit."
          else
            git commit -m "Update daily package verification report."
            git push --force origin automation/daily-package-update
          fi

      - name: Write review instructions
        run: |
          {
            echo "## Manual review branch"
            echo
            echo "The daily package verification report was pushed to:"
            echo
            echo "- \`automation/daily-package-update\`"
            echo
            echo "GitHub Actions is not permitted by this repository to create pull requests automatically."
            echo "Open a pull request manually from the branch above if a review PR is needed."
          } >> "$GITHUB_STEP_SUMMARY"
